<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>CSS Spill - Korridoren</title>
    <style>
        /* --- GRUNNLEGGENDE STIL --- */
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background: #111;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- LOGIKK (SKJULTE INPUTS) --- */
        #start-game, #interact-trigger, .ui-trigger {
            display: none;
        }

        /* --- LOBBY --- */
        #lobby {
            text-align: center;
            background: #222;
            padding: 40px;
            border: 3px solid #444;
            z-index: 10;
        }

        .setting-group {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        /* Skala 1-5 knapper */
        .scale-box {
            width: 30px;
            height: 30px;
            background: #444;
            display: inline-block;
            line-height: 30px;
            cursor: pointer;
            border: 1px solid #666;
        }

        .ui-trigger:checked + .scale-box {
            background: #00ff00;
            color: black;
        }

        .start-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #aa0000;
            color: white;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* --- SPILLVERDEN --- */
        #game-world {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #050505;
            display: none; /* Skjult til spillet starter */
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Korridor-visning */
        .corridor {
            width: 100%;
            height: 80%;
            background: linear-gradient(to bottom, #111 0%, #333 50%, #111 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Døren bak deg */
        .door {
            width: 120px;
            height: 200px;
            background: #3d2b1f;
            border: 4px solid #000;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* Interaksjonsknapp (E / Mobil) */
        .interact-label {
            position: absolute;
            bottom: 40px;
            background: orange;
            color: black;
            padding: 15px 25px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            display: block;
        }

        /* Tekstboble */
        #message {
            position: absolute;
            bottom: 20px;
            background: rgba(0,0,0,0.9);
            border: 2px solid white;
            padding: 20px;
            width: 80%;
            text-align: center;
            display: none; /* Skjult til man trykker */
        }

        /* --- CSS GAMEPLAY LOGIKK --- */

        /* 1. Vis spillet når start-knappen trykkes */
        #start-game:checked ~ #game-world {
            display: flex;
        }
        #start-game:checked ~ #lobby {
            display: none;
        }

        /* 2. Vis tekstboble når man "interagerer" */
        #interact-trigger:checked ~ #game-world #message {
            display: block;
        }

        /* 3. Simuler at knappen er "E" for tastaturbrukere */
        /* Merk: CSS kan ikke fange opp 'E' direkte uten JS, 
           men vi bruker labelen som en usynlig flate eller knapp. */

    </style>
</head>
<body>

    <input type="checkbox" id="start-game">
    <input type="checkbox" id="interact-trigger">

    <div id="lobby">
        <h1>HOVEDMENY</h1>
        
        <p>Vanskelighetsgrad:</p>
        <div class="setting-group">
            <input type="radio" name="diff" id="d1" class="ui-trigger"><label for="d1" class="scale-box">1</label>
            <input type="radio" name="diff" id="d2" class="ui-trigger"><label for="d2" class="scale-box">2</label>
            <input type="radio" name="diff" id="d3" class="ui-trigger" checked><label for="d3" class="scale-box">3</label>
            <input type="radio" name="diff" id="d4" class="ui-trigger"><label for="d4" class="scale-box">4</label>
            <input type="radio" name="diff" id="d5" class="ui-trigger"><label for="d5" class="scale-box">5</label>
        </div>

        <p>Kartstørrelse:</p>
        <div class="setting-group">
            <input type="radio" name="map" id="m1" class="ui-trigger"><label for="m1" class="scale-box">1</label>
            <input type="radio" name="map" id="m2" class="ui-trigger"><label for="m2" class="scale-box">2</label>
            <input type="radio" name="map" id="m3" class="ui-trigger" checked><label for="m3" class="scale-box">3</label>
            <input type="radio" name="map" id="m4" class="ui-trigger"><label for="m4" class="scale-box">4</label>
            <input type="radio" name="map" id="m5" class="ui-trigger"><label for="m5" class="scale-box">5</label>
        </div>

        <label for="start-game" class="start-btn">START RUNDE</label>
    </div>

    <div id="game-world">
        <div class="corridor">
            <div class="door"></div>
            
            <label for="interact-trigger" class="interact-label">Bruk (E)</label>
        </div>

        <div id="message">
            Den er låst...
            <br>
            <label for="interact-trigger" style="font-size: 12px; color: gray; cursor: pointer;">[Lukk]</label>
        </div>
    </div>

</body>
</html>
