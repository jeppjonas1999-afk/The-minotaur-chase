<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: Shadow & Stealth</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .box { border: 2px solid #333; padding: 40px; background: #111; width: 400px; text-align: center; }
        h1 { letter-spacing: 10px; color: #800; text-shadow: 0 0 10px #f00; margin: 0; }
        #menu-tip { color: #666; font-size: 11px; margin-bottom: 20px; min-height: 1.2em; text-transform: uppercase; }
        select, button { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #300; border-color: #f00; }
        #sniff-alert { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 24px; font-weight: bold; display: none; z-index: 200; text-align: center; width: 100%; text-shadow: 0 0 10px #f00; }
        #ui-status { position: absolute; bottom: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 10px; border: 1px solid #444; font-size: 12px; z-index: 200; }
        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; justify-content: center; align-items: center; }
        .scare-face { width: 100%; height: 100%; background: radial-gradient(circle, #f00 0%, #000 70%); display: flex; justify-content: center; align-items: center; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -10px); } 100% { transform: translate(5px, 5px); } }
        #victory-screen { display: none; background: rgba(0, 50, 0, 0.9); }
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid #444; display: none; z-index: 50; }
    </style>
</head>
<body onload="setRandomTip()">

    <div id="sniff-alert">The minotaur is sniffing around... RUN!</div>
    <div id="ui-status">Cooldown: KLAR</div>

    <div id="menu" class="overlay">
        <div class="box">
            <h1>MINOTAUR</h1>
            <p id="menu-tip">Laster tips...</p>
            <select id="size">
                <option value="15">LITEN (KOMPAKT)</option>
                <option value="25" selected>STOR</option>
                <option value="45">DIGERT</option>
            </select>
            <select id="diff">
                <option value="easy">ENKEL</option>
                <option value="medium" selected>MEDIUM</option>
                <option value="hard">VANSKELIG</option>
            </select>
            <button onclick="start()">START FLUKTEN</button>
        </div>
    </div>

    <div id="jumpscare"><div class="scare-face"><h1 style="font-size: 80px; color: #fff;">FANGET!</h1></div></div>
    <div id="victory-screen" class="overlay"><div class="box" style="border-color: #0f0;"><h1 style="color: #0f0;">FRIHET</h1><button onclick="location.reload()">SPILL IGJEN</button></div></div>
    <div id="prompt">TRYKK [E]</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const tileSize = 40;
const moveTime = 350;

let grid = [], items = [], placedLights = [], hideSpots = [], exit = {x:0, y:0};
let isRunning = false;
let player = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, visionRadius: 180, isHiding: false, hideEnd: 0, hideCooldown: 0 };
let monster = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, waitEnd: 0, baseSpeedMult: 1, abilityActive: false, nextAbilityTime: 0, speedBoost: 1, scentX: -1, scentY: -1, rotation: 0 };

const mapSettings = { 15: { loot: 40, spots: 5 }, 25: { loot: 60, spots: 10 }, 45: { loot: 80, spots: 25 } };
const diffSettings = {
    easy: { mSpeed: 0.8, abMin: 60000, abMax: 90000, scentError: 80 },
    medium: { mSpeed: 1.1, abMin: 45000, abMax: 75000, scentError: 50 },
    hard: { mSpeed: 1.7, abMin: 20000, abMax: 45000, scentError: 30 }
};

function setRandomTip() {
    const tips = ["Gjem deg i de grønne søppelkassene når minotauren lukter!", "Minotauren vet nøyaktig hvor du er når han sniffer!", "Ellers leter han bare i den generelle retningen din.", "Søppelkasser har en svak glød som hjelper deg å finne dem."];
    document.getElementById("menu-tip").innerText = tips[Math.floor(Math.random() * tips.length)];
}

function start() {
    const s = parseInt(document.getElementById("size").value);
    const mConf = mapSettings[s], dConf = diffSettings[document.getElementById("diff").value];
    generateMaze(s);
    player.gridX = 1; player.gridY = grid.length - 2;
    player.renderX = player.gridX * tileSize; player.renderY = player.gridY * tileSize;
    player.targetX = player.gridX; player.targetY = player.gridY;
    monster.gridX = Math.floor(grid[0].length / 2); monster.gridY = Math.floor(grid.length / 2);
    if(grid[monster.gridY][monster.gridX] === 1) monster.gridX++;
    monster.renderX = monster.gridX * tileSize; monster.renderY = monster.gridY * tileSize;
    monster.targetX = monster.gridX; monster.targetY = monster.gridY;
    monster.baseSpeedMult = dConf.mSpeed;
    spawnExtras(mConf.loot, mConf.spots);
    setNextAbility(performance.now(), dConf);
    document.getElementById("menu").style.display = "none";
    isRunning = true;
    requestAnimationFrame(loop);
}

function setNextAbility(now, conf) { monster.nextAbilityTime = now + (Math.random() * (conf.abMax - conf.abMin) + conf.abMin); }

function generateMaze(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    function walk(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < dim-1 && nx > 0 && nx < dim-1 && grid[ny][nx] === 1) { grid[y + dy/2][x + dx/2] = 0; walk(nx, ny); }
        }
    }
    walk(1, 1); exit = { x: dim - 2, y: 1 };
}

function spawnExtras(lootCount, spotCount) {
    items = []; hideSpots = []; let dim = grid.length;
    for(let i=0; i<spotCount; i++) {
        let x, y; do { x = Math.floor(Math.random()*dim); y = Math.floor(Math.random()*dim); } while(grid[y][x] === 1 || (x === player.gridX && y === player.gridY));
        hideSpots.push({x, y});
    }
    for(let i=0; i<lootCount; i++) {
        let x, y; do { x = Math.floor(Math.random()*dim); y = Math.floor(Math.random()*dim); } while(grid[y][x] === 1 || hideSpots.some(s=>s.x===x && s.y===y));
        items.push({x, y, type: Math.random() > 0.4 ? 'orange' : 'yellow'});
    }
}

function update(now) {
    if (!isRunning) return;
    const dConf = diffSettings[document.getElementById("diff").value];

    if (now > monster.nextAbilityTime && !monster.abilityActive) {
        monster.abilityActive = true; monster.waitEnd = now + 2500;
        if (player.isHiding) { monster.scentX = -1; monster.scentY = -1; } 
        else {
            monster.scentX = player.gridX; monster.scentY = player.gridY; // NØYAKTIG posisjon i jaktmodus
            document.getElementById("sniff-alert").style.display = "block";
            setTimeout(() => { if (monster.scentX !== -1) monster.speedBoost = 2.0; document.getElementById("sniff-alert").style.display = "none"; }, 2500);
        }
    }

    if (monster.scentX !== -1 && monster.gridX === monster.scentX && monster.gridY === monster.scentY) {
        monster.abilityActive = false; monster.speedBoost = 1.0; monster.scentX = -1; setNextAbility(performance.now(), dConf);
    } else if (monster.abilityActive && monster.scentX === -1 && now > monster.waitEnd + 2000) {
        monster.abilityActive = false; setNextAbility(performance.now(), dConf);
    }

    if (player.isHiding && now > player.hideEnd) { player.isHiding = false; player.hideCooldown = now + 15000; }
    const cd = Math.max(0, Math.ceil((player.hideCooldown - now) / 1000));
    document.getElementById("ui-status").innerText = player.isHiding ? "GJEMT!" : (cd > 0 ? `Cooldown: ${cd}s` : "KLAR");

    if (!player.isHiding) {
        if (!player.isMoving) {
            let dx = 0, dy = 0;
            if (keys['w'] || keys['arrowup']) dy = -1; else if (keys['s'] || keys['arrowdown']) dy = 1; else if (keys['a'] || keys['arrowleft']) dx = -1; else if (keys['d'] || keys['arrowright']) dx = 1;
            if (dx !== 0 || dy !== 0) {
                let nx = player.gridX + dx, ny = player.gridY + dy;
                if (grid[ny] && grid[ny][nx] === 0) { player.isMoving = true; player.moveStart = now; player.targetX = nx; player.targetY = ny; }
            }
        } else {
            let t = Math.min((now - player.moveStart) / moveTime, 1);
            player.renderX = (player.gridX + (player.targetX - player.gridX) * t) * tileSize;
            player.renderY = (player.gridY + (player.targetY - player.gridY) * t) * tileSize;
            if (t === 1) { player.isMoving = false; player.gridX = player.targetX; player.gridY = player.targetY; }
        }
    }

    // MONSTER AI MED TO MODUSER
    if (!monster.isMoving && now > monster.waitEnd) {
        let tx, ty;
        if (monster.scentX !== -1) {
            tx = monster.scentX; ty = monster.scentY; // Nøyaktig mål under jakt
        } else {
            // Passive modus: Leter med feilmargin (Leteradius)
            let errX = Math.floor((Math.random() - 0.5) * dConf.scentError);
            let errY = Math.floor((Math.random() - 0.5) * dConf.scentError);
            tx = Math.max(1, Math.min(grid[0].length-2, player.gridX + errX));
            ty = Math.max(1, Math.min(grid.length-2, player.gridY + errY));
            if(grid[ty][tx] === 1) { tx = player.gridX; ty = player.gridY; }
        }

        let q = [{x: monster.gridX, y: monster.gridY, p: []}], v = new Set([`${monster.gridX},${monster.gridY}`]), n = null;
        while(q.length > 0) {
            let c = q.shift(); if(c.x === tx && c.y === ty) { n = c.p[0]; break; }
            [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx, dy]) => {
                let nx = c.x + dx, ny = c.y + dy;
                if(grid[ny] && grid[ny][nx] === 0 && !v.has(`${nx},${ny}`)) { v.add(`${nx},${ny}`); q.push({x: nx, y: ny, p: [...c.p, {x: nx, y: ny}]}); }
            });
        }
        if (n) { monster.isMoving = true; monster.moveStart = now; monster.targetX = n.x; monster.targetY = n.y; }
    } else if (monster.isMoving) {
        let speed = (moveTime / (monster.baseSpeedMult * monster.speedBoost));
        let t = Math.min((now - monster.moveStart) / speed, 1);
        monster.renderX = (monster.gridX + (monster.targetX - monster.gridX) * t) * tileSize;
        monster.renderY = (monster.gridY + (monster.targetY - monster.gridY) * t) * tileSize;
        if (t === 1) { monster.isMoving = false; monster.gridX = monster.targetX; monster.gridY = monster.targetY; }
    }

    if (!player.isHiding && Math.abs(player.renderX - monster.renderX) < 25 && Math.abs(player.renderY - monster.renderY) < 25) { isRunning = false; document.getElementById("jumpscare").style.display = "flex"; setTimeout(() => location.reload(), 2000); }
    if (player.gridX === exit.x && player.gridY === exit.y) { isRunning = false; document.getElementById("victory-screen").style.display = "flex"; }
    monster.rotation += 0.07;
    document.getElementById("prompt").style.display = (items.some(it=>it.x===player.gridX && it.y===player.gridY) || hideSpots.some(s=>s.x===player.gridX && s.y===player.gridY)) ? "block" : "none";
}

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const offX = canvas.width/2 - player.renderX - 20, offY = canvas.height/2 - player.renderY - 20;

    ctx.fillStyle = "#050505"; ctx.fillRect(0,0, canvas.width, canvas.height);
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) if(grid[y][x] === 1) { ctx.fillStyle = "#1a1a1a"; ctx.fillRect(x*tileSize+offX, y*tileSize+offY, tileSize, tileSize); }
    hideSpots.forEach(s => { ctx.fillStyle = "rgba(0, 100, 0, 0.4)"; ctx.fillRect(s.x*tileSize+offX+5, s.y*tileSize+offY+5, tileSize-10, tileSize-10); });
    items.forEach(it => { ctx.fillStyle = it.type === 'orange' ? "#ffa500" : "#ffff00"; ctx.beginPath(); ctx.arc(it.x*tileSize+offX+20, it.y*tileSize+offY+20, 8, 0, Math.PI*2); ctx.fill(); });
    ctx.fillStyle = "#0f0"; ctx.fillRect(exit.x*tileSize+offX+10, exit.y*tileSize+offY+10, 20, 20);
    ctx.fillStyle = monster.speedBoost > 1 ? "#f00" : "#600";
    ctx.beginPath(); ctx.arc(monster.renderX+offX+20, monster.renderY+offY+20, 14, 0, Math.PI*2); ctx.fill();
    if (!player.isHiding) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, Math.PI*2); ctx.fill(); }

    let temp = document.createElement('canvas'); temp.width = canvas.width; temp.height = canvas.height;
    let tCtx = temp.getContext('2d');
    tCtx.fillStyle = "rgba(0,0,0,0.98)"; tCtx.fillRect(0,0,canvas.width,canvas.height);
    tCtx.globalCompositeOperation = "destination-out";
    let pG = tCtx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, player.visionRadius);
    pG.addColorStop(0, "white"); pG.addColorStop(1, "transparent");
    tCtx.fillStyle = pG; tCtx.beginPath(); tCtx.arc(canvas.width/2, canvas.height/2, player.visionRadius, 0, Math.PI*2); tCtx.fill();
    placedLights.forEach(l => {
        let lx = l.x*tileSize+offX+20, ly = l.y*tileSize+offY+20;
        let lG = tCtx.createRadialGradient(lx, ly, 10, lx, ly, 160);
        lG.addColorStop(0, "white"); lG.addColorStop(1, "transparent");
        tCtx.fillStyle = lG; tCtx.beginPath(); tCtx.arc(lx, ly, 160, 0, Math.PI*2); tCtx.fill();
    });
    // SVAK GLØD FRA SØPPELKASSER
    hideSpots.forEach(s => {
        let sx = s.x*tileSize+offX+20, sy = s.y*tileSize+offY+20;
        let sG = tCtx.createRadialGradient(sx, sy, 5, sx, sy, 60);
        sG.addColorStop(0, "rgba(255,255,255,0.4)"); sG.addColorStop(1, "transparent");
        tCtx.fillStyle = sG; tCtx.beginPath(); tCtx.arc(sx, sy, 60, 0, Math.PI*2); tCtx.fill();
    });
    ctx.drawImage(temp, 0, 0);

    if (monster.abilityActive) {
        const mx = monster.renderX + offX + 20, my = monster.renderY + offY + 20;
        ctx.save(); ctx.translate(mx, my); ctx.rotate(monster.rotation);
        ctx.strokeStyle = "#ff0000"; ctx.lineWidth = 4;
        for(let i=0; i<4; i++) { ctx.rotate(Math.PI/2); ctx.beginPath(); ctx.moveTo(50, -10); ctx.lineTo(60, 0); ctx.lineTo(50, 10); ctx.stroke(); }
        ctx.restore();
    }
    requestAnimationFrame(loop);
}

const keys = {};
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => {
    keys[e.key.toLowerCase()] = false;
    if(e.key.toLowerCase() === 'e') {
        let i = items.findIndex(it => it.x === player.gridX && it.y === player.gridY);
        if(i !== -1) { if(items[i].type === 'orange') placedLights.push({x: player.gridX, y: player.gridY}); else player.visionRadius += 60; items.splice(i, 1); return; }
        let spot = hideSpots.some(s => s.x === player.gridX && s.y === player.gridY);
        if(spot && performance.now() > player.hideCooldown && !player.isHiding) { player.isHiding = true; player.hideEnd = performance.now() + 3000; }
    }
};
</script>
</body>
</html>
