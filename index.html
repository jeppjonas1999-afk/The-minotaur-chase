<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Vault - v.9.7 Roulette Update</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        #menu-wrapper { display: flex; position: relative; align-items: stretch; flex-direction: column; }
        #menu-top-section { display: flex; position: relative; align-items: stretch; }
        .main-box { border: 2px solid #333; padding: 40px; background: #111; width: 350px; text-align: center; z-index: 2; position: relative; }
        
        #settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; transition: transform 0.5s; z-index: 10; }
        #settings-btn.open { transform: rotate(540deg); }
        #settings-panel { 
            position: absolute; top: 50px; left: 15px; background: #222; border: 1px solid #444; border-radius: 5px;
            padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.5s, padding 0.5s;
            width: 200px; text-align: left; z-index: 9; box-sizing: border-box;
        }
        #settings-panel.open { max-height: 150px; padding: 15px; }
        
        #mp-btns { position: absolute; top: 15px; left: 55px; display: flex; gap: 5px; z-index: 10; }
        .mp-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 3px; }
        
        /* ROULETTE STYLES */
        #roulette-overlay { position: fixed; inset: 0; background: #000; z-index: 500; display: none; flex-direction: column; justify-content: center; align-items: center; }
        #roulette-container { position: relative; width: 300px; height: 400px; overflow: hidden; border-left: 2px solid #333; border-right: 2px solid #333; background: #0a0a0a; }
        #roulette-strip { position: absolute; width: 100%; top: 0; display: flex; flex-direction: column; align-items: center; }
        .roulette-item { height: 80px; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; transition: transform 0.1s, font-size 0.1s; width: 100%; text-transform: uppercase; }
        .roulette-shadow-top { position: absolute; top: 0; width: 100%; height: 120px; background: linear-gradient(to bottom, #000, transparent); z-index: 2; pointer-events: none; }
        .roulette-shadow-bottom { position: absolute; bottom: 0; width: 100%; height: 120px; background: linear-gradient(to top, #000, transparent); z-index: 2; pointer-events: none; }
        #roulette-marker { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(255,255,255,0.2); transform: translateY(-50%); z-index: 3; }
        
        #rig-btn { margin-top: 20px; background: #222; color: #888; border: 1px solid #444; padding: 5px 15px; cursor: pointer; font-family: inherit; z-index: 501; display: none; }
        #rig-btn:hover { background: #333; color: #fff; }
        #rig-menu { position: absolute; bottom: 100px; background: #111; border: 1px solid #555; display: none; flex-direction: column; padding: 10px; z-index: 600; min-width: 150px; }
        .rig-option { padding: 8px 15px; cursor: pointer; border-bottom: 1px solid #222; text-align: center; }
        .rig-option:hover { background: #444; }

        /* MODIFIERS */
        #modifiers-wrapper { width: 0px; overflow: hidden; transition: width 0.5s; position: relative; }
        #modifiers-wrapper.open { width: 450px; }
        #modifiers-panel { width: 450px; background: #0f0f0f; border: 2px solid #333; border-left: none; padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; box-sizing: border-box; height: 100%; }
        #expand-btn { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; color: #fff; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 10px 10px 0; }
        
        .mod-slot { border: 1px dashed #222; display: flex; flex-direction: column; align-items: center; background: #0a0a0a; font-size: 20px; aspect-ratio: 1; }
        .mod-active { border: 1px solid #444; background: #111; padding: 5px; justify-content: flex-start;}
        .mod-btns { display: flex; gap: 2px; width: 100%; margin-top: auto; }
        .mod-btns button { flex: 1; font-size: 10px; padding: 5px 0; background: #1a1a1a; color: #fff; border: 1px solid #333; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; }

        #lobby-slots { display: flex; gap: 10px; margin-top: 15px; justify-content: center; }
        .lobby-slot { width: 60px; height: 60px; border: 2px dashed #444; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; font-size: 10px;}
        .slot-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; margin-bottom: 5px; }
        .slot-dot.active { background: #0f0; }

    </style>
</head>
<body onload="init()">

    <div id="roulette-overlay">
        <div id="roulette-container">
            <div class="roulette-shadow-top"></div>
            <div id="roulette-marker"></div>
            <div id="roulette-strip"></div>
            <div class="roulette-shadow-bottom"></div>
        </div>
        <button id="rig-btn" onclick="toggleRigMenu()">Rig odds?</button>
        <div id="rig-menu"></div>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div id="menu-top-section">
                <div class="main-box">
                    <div id="settings-btn" onclick="toggleSettings()">⚙️</div>
                    <div id="mp-btns">
                        <button class="mp-btn" id="btn-host" onclick="hostGame()">Host game</button>
                        <button class="mp-btn" id="btn-join" onclick="addDummyPlayer()">Add Player (Test)</button>
                    </div>
                    <h1 style="color:#800; letter-spacing:8px; margin:0; margin-top:20px;">MINOTAUR</h1>
                    <p style="color:#333; font-size:10px; margin-bottom:20px;">v.9.7</p>
                    
                    <select id="size"><option value="15">SMALL</option><option value="25" selected>MEDIUM</option><option value="40">LARGE</option></select>
                    <button class="start-btn" onclick="preStartCheck()" style="width:100%; padding:15px; background:#300; color:white; border:none; cursor:pointer; margin-top:20px; font-weight:bold;">START GAME</button>
                </div>
                
                <div id="modifiers-wrapper">
                    <div id="modifiers-panel">
                        <div class="mod-slot mod-active"><div>CHAOS</div><div class="mod-btns"><button id="c0" class="active" onclick="setChaos(0)">0</button><button id="c1" onclick="setChaos(1)">1</button><button id="c2" onclick="setChaos(2)">2</button></div></div>
                        <div class="mod-slot mod-active"><div>U-MINO</div><div class="mod-btns"><button id="u0" class="active" onclick="setUMino(false)">OFF</button><button id="u1" onclick="setUMino(true)">ON</button></div></div>
                    </div>
                </div>
                <div id="expand-btn" onclick="togglePanel()">+</div>
            </div>
            
            <div id="lobby-slots">
                </div>
        </div>
    </div>
    
    <canvas id="game"></canvas>

<script>
let chaos = 0, uMinoMode = false, isRunning = false, grid = [], humans = [], monsters = [];
let mpState = { isHost: false, players: [{name:"Player 1 (You)", id:0}], riggedTarget: null };
let player = { gridX:1, gridY:1, renderX:0, renderY:0, isMoving:false, isGhost:false, role:'human' };
let baseHumanSpeed = 300, tileSize = 40, mazeCenter = {x:0,y:0};

const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");

function init() {
    updateLobbyUI();
}

// --- MENU & LOBBY LOGIC ---
function toggleSettings() { document.getElementById('settings-btn').classList.toggle('open'); }
function togglePanel() { document.getElementById('modifiers-wrapper').classList.toggle('open'); }
function setChaos(n) { chaos=n; [0,1,2].forEach(i=>document.getElementById('c'+i).classList.toggle('active', i===n)); }
function setUMino(v) { uMinoMode=v; document.getElementById('u0').classList.toggle('active', !v); document.getElementById('u1').classList.toggle('active', v); }

function hostGame() { mpState.isHost = true; document.getElementById('btn-host').style.background = '#050'; updateLobbyUI(); }
function addDummyPlayer() { 
    if(mpState.players.length < 5) {
        mpState.players.push({name: "Player " + (mpState.players.length+1), id: mpState.players.length});
        updateLobbyUI();
    }
}

function updateLobbyUI() {
    const container = document.getElementById('lobby-slots');
    container.innerHTML = '';
    for(let i=0; i<5; i++) {
        let p = mpState.players[i];
        container.innerHTML += `<div class="lobby-slot"><div class="slot-dot ${p?'active':''}"></div><div>${p?p.name:'Empty'}</div></div>`;
    }
}

function toggleRigMenu() {
    let m = document.getElementById('rig-menu');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

function setRigTarget(id, name) {
    mpState.riggedTarget = id;
    toggleRigMenu();
    document.getElementById('rig-btn').innerText = id !== null ? `Rigged: ${name}` : "Rig odds?";
    document.getElementById('rig-btn').style.color = id !== null ? "#f00" : "#888";
}

// --- ROULETTE LOGIC ---
function preStartCheck() {
    if(uMinoMode) { startRoulette(); } else { startGame(); }
}

function startRoulette() {
    const overlay = document.getElementById('roulette-overlay');
    const strip = document.getElementById('roulette-strip');
    const rigBtn = document.getElementById('rig-btn');
    overlay.style.display = 'flex';
    strip.innerHTML = '';
    
    // Only host sees the rig button
    if(mpState.isHost) {
        rigBtn.style.display = 'block';
        const rigMenu = document.getElementById('rig-menu');
        rigMenu.innerHTML = `<div class="rig-option" onclick="setRigTarget(null, '')">No Rig (Random)</div>`;
        mpState.players.forEach(p => {
            rigMenu.innerHTML += `<div class="rig-option" onclick="setRigTarget(${p.id}, '${p.name}')">${p.name}</div>`;
        });
    }

    // Logic for slots based on players and chaos modifier
    let totalPlayers = mpState.players.length;
    let minoCount = 1 + chaos;
    let humanCount = Math.max(0, totalPlayers - minoCount); 
    
    // Create the visual strip (bunch of items for scrolling effect)
    let pool = [];
    for(let i=0; i<60; i++) {
        let isMino = Math.random() < (minoCount / (minoCount + humanCount));
        pool.push(isMino ? {text:'MINOTAUR', color:'red'} : {text:'HUMAN', color:'#4488ff'});
    }

    // Determine YOUR actual role for this client
    let amIMinotaur = false;
    if (mpState.riggedTarget === 0) { // 0 is always "You" in this test setup
        amIMinotaur = true;
    } else if (mpState.riggedTarget === null) {
        // Random chance if not rigged
        amIMinotaur = Math.random() < (minoCount / totalPlayers);
    }
    
    player.role = amIMinotaur ? 'minotaur' : 'human';
    
    // Set the winning slot (item 50) to match your role
    pool[50] = amIMinotaur ? {text:'MINOTAUR', color:'red'} : {text:'HUMAN', color:'#4488ff'};

    // Build DOM
    pool.forEach(item => {
        let div = document.createElement('div');
        div.className = 'roulette-item';
        div.innerText = item.text;
        div.style.color = item.color;
        strip.appendChild(div);
    });

    let pos = 0;
    let speed = 50; 
    
    function animate() {
        pos += speed;
        speed *= 0.98; // Friction

        if(speed < 0.1) {
            setTimeout(() => {
                overlay.style.display = 'none';
                startGame();
            }, 2000);
            return;
        }

        strip.style.transform = `translateY(${-pos + 160}px)`; // Offset to middle

        // 5% Fisheye effect for elements in the exact center
        const centerLine = window.innerHeight / 2;
        document.querySelectorAll('.roulette-item').forEach(el => {
            let rect = el.getBoundingClientRect();
            let elCenter = rect.top + (rect.height / 2);
            let dist = Math.abs(centerLine - elCenter);
            
            if(dist < 40) {
                el.style.transform = "scale(1.05)";
            } else {
                el.style.transform = "scale(1.0)";
            }
        });

        requestAnimationFrame(animate);
    }
    requestAnimationFrame(animate);
}

// --- GAME LOGIC ---
function startGame() {
    let s = parseInt(document.getElementById("size").value), dim = s*2+1;
    grid = Array.from({length:dim}, ()=>Array(dim).fill(1)); 
    mazeCenter = {x:Math.floor(dim/2), y:Math.floor(dim/2)};
    
    // Basic Maze Generation
    let walls=[]; const addW=(x,y)=>{ [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{ let nx=x+dx*2, ny=y+dy*2; if(ny>0&&ny<dim-1&&nx>0&&nx<dim-1&&grid[ny][nx]===1) walls.push({x:nx,y:ny,wx:x+dx,wy:y+dy}); }); };
    grid[1][1]=0; addW(1,1);
    while(walls.length>0) { let i=Math.floor(Math.random()*walls.length); let {x,y,wx,wy}=walls.splice(i,1)[0]; if(grid[y][x]===1){ grid[wy][wx]=0; grid[y][x]=0; addW(x,y); } }
    for(let y=mazeCenter.y-1; y<=mazeCenter.y+1; y++) for(let x=mazeCenter.x-1; x<=mazeCenter.x+1; x++) grid[y][x]=0;

    humans = []; monsters = [];
    player.isGhost = false;
    document.getElementById("menu").style.display = "none";

    if(uMinoMode) {
        if(player.role === 'minotaur') {
            player.gridX = mazeCenter.x; player.gridY = mazeCenter.y;
        } else {
            player.gridX = 1; player.gridY = 1;
        }
        
        // AI FILLER LOGIC: Always ensure 4 humans exist
        let actualHumanPlayers = mpState.players.length - (1 + chaos); // Simplified logic
        if(player.role === 'human') actualHumanPlayers = 1; // You are a human
        else actualHumanPlayers = 0; // You are minotaur, other players handled over network
        
        // Simulate missing network players as AI
        let totalHumansToSpawn = 4;
        let aiNeeded = totalHumansToSpawn - actualHumanPlayers;
        
        for(let i=0; i<aiNeeded; i++) {
            let hx, hy; 
            do { hx=Math.floor(Math.random()*dim); hy=Math.floor(Math.random()*dim); } 
            while(grid[hy][hx]===1 || Math.hypot(hx-mazeCenter.x, hy-mazeCenter.y) < 5);
            humans.push({ x:hx, y:hy, isAI: true });
        }
    } else {
        player.gridX = 1; player.gridY = 1;
        monsters.push({ x:mazeCenter.x, y:mazeCenter.y });
    }

    player.renderX = player.gridX * tileSize; 
    player.renderY = player.gridY * tileSize;
    
    isRunning = true;
    requestAnimationFrame(gameLoop);
}

function gameLoop(now) {
    if(!isRunning) return;
    
    // GHOST SPEED LOGIC
    let currentSpeed = baseHumanSpeed;
    if(player.isGhost) {
        currentSpeed /= 2.5; // Lower divisor = faster execution in time-based movement
    }

    if(!player.isMoving) {
        let dx=0, dy=0; 
        if(window.keys?.w) dy=-1; else if(window.keys?.s) dy=1; 
        else if(window.keys?.a) dx=-1; else if(window.keys?.d) dx=1;
        
        if(dx||dy){ 
            let nx=player.gridX+dx, ny=player.gridY+dy; 
            if(grid[ny] && (grid[ny][nx]===0 || player.isGhost)){ 
                player.isMoving=true; player.moveStart=now; player.targetX=nx; player.targetY=ny; 
            } 
        }
    } else {
        let t = Math.min((now-player.moveStart)/currentSpeed, 1);
        player.renderX = (player.gridX+(player.targetX-player.gridX)*t)*tileSize; 
        player.renderY = (player.gridY+(player.targetY-player.gridY)*t)*tileSize;
        if(t===1){ player.gridX=player.targetX; player.gridY=player.targetY; player.isMoving=false; }
    }

    // DRAWING
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ox = canvas.width/2 - player.renderX - 20, oy = canvas.height/2 - player.renderY - 20;
    
    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    ctx.fillStyle = "#333";
    for(let y=0; y<grid.length; y++) {
        for(let x=0; x<grid[y].length; x++) {
            if(grid[y][x]===1) ctx.fillRect(x*tileSize+ox, y*tileSize+oy, tileSize, tileSize);
        }
    }

    // Draw AI Humans
    ctx.fillStyle = "#4488ff";
    humans.forEach(h => {
        ctx.beginPath(); ctx.arc(h.x*tileSize+ox+20, h.y*tileSize+oy+20, 11, 0, Math.PI*2); ctx.fill();
    });

    // Draw Player
    ctx.fillStyle = player.isGhost ? "rgba(200,200,255,0.5)" : (player.role === 'minotaur' ? "#f00" : "#fff");
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, player.role === 'minotaur' ? 15 : 11, 0, Math.PI*2); ctx.fill();

    // Toggle ghost mode for testing (Press G)
    if(window.keys?.g && !player.gPressed) { player.isGhost = !player.isGhost; player.gPressed = true; }
    if(!window.keys?.g) player.gPressed = false;

    requestAnimationFrame(gameLoop);
}

window.keys = {};
window.onkeydown = e => window.keys[e.key.toLowerCase()] = true;
window.onkeyup = e => window.keys[e.key.toLowerCase()] = false;

</script>
</body>
</html>
