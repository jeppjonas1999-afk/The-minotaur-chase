<!DOCTYPE html>
<html>
<head>
    <title>2D Labyrint - Top Down</title>
    <style>
        body { margin: 0; background: black; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { border: 2px solid #333; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Bruk piltaster eller WASD for å gå. Trykk E ved døra.</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// --- INNSTILLINGER ---
const tileSize = 40;       // Størrelse på hver rute
const viewDist = 3;        // Hvor mange ruter man ser (Synsfelt)
const mapSize = 15;        // 15x15 labyrint (Level 3 skala)
canvas.width = 600;        // Skjermstørrelse
canvas.height = 600;

// --- GENERER KART (0=vei, 1=vegg) ---
let grid = [];
for(let y=0; y<mapSize; y++) {
    grid[y] = [];
    for(let x=0; x<mapSize; x++) grid[y][x] = 1;
}

function carve(x, y) {
    grid[y][x] = 0;
    let dirs = [[0,-2],[0,2],[-2,0],[2,0]].sort(() => Math.random() - 0.5);
    for(let [dx, dy] of dirs) {
        let nx = x + dx, ny = y + dy;
        if(ny>0 && ny<mapSize-1 && nx>0 && nx<mapSize-1 && grid[ny][nx] == 1) {
            grid[y + dy/2][x + dx/2] = 0;
            carve(nx, ny);
        }
    }
}
carve(1, mapSize-2); // Start nederst til venstre

// Lag et 3x3 åpent rom i midten (Istedenfor 10x10 for å passe dette mappet)
const mid = Math.floor(mapSize/2);
for(let y=mid-1; y<=mid+1; y++) {
    for(let x=mid-1; x<=mid+1; x++) grid[y][x] = 0;
}

// --- SPILLER ---
let player = { x: 1, y: mapSize-2 };

// --- INPUT ---
window.addEventListener("keydown", e => {
    let nextX = player.x;
    let nextY = player.y;
    if(e.key.toLowerCase() === "w" || e.key === "ArrowUp") nextY--;
    if(e.key.toLowerCase() === "s" || e.key === "ArrowDown") nextY++;
    if(e.key.toLowerCase() === "a" || e.key === "ArrowLeft") nextX--;
    if(e.key.toLowerCase() === "d" || e.key === "ArrowRight") nextX++;
    
    if(e.key.toLowerCase() === "e") {
        if(player.y === mapSize-2 && player.x === 1) alert("Den er låst bak deg!");
    }

    // Kollisjonssjekk
    if(grid[nextY] && grid[nextY][nextX] === 0) {
        player.x = nextX;
        player.y = nextY;
    }
    draw();
});

// --- TEGNING ---
function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    for(let y=0; y<mapSize; y++) {
        for(let x=0; x<mapSize; x++) {
            // Beregn avstand til spiller (Fog of War)
            let dist = Math.sqrt((x-player.x)**2 + (y-player.y)**2);
            
            if(dist < viewDist) {
                // Tegn det vi ser
                let screenX = centerX + (x - player.x) * tileSize - tileSize/2;
                let screenY = centerY + (y - player.y) * tileSize - tileSize/2;

                ctx.fillStyle = grid[y][x] === 1 ? "#333" : "#111";
                ctx.fillRect(screenX, screenY, tileSize, tileSize);
                
                // Tegn "vegg-kant"
                if(grid[y][x] === 1) {
                    ctx.strokeStyle = "#444";
                    ctx.strokeRect(screenX, screenY, tileSize, tileSize);
                }
            }
        }
    }

    // Tegn spiller (i midten av skjermen)
    ctx.fillStyle = "cyan";
    ctx.beginPath();
    ctx.arc(centerX, centerY, tileSize/3, 0, Math.PI*2);
    ctx.fill();
    
    // Legg på et "skygge-lag" over alt for å gjøre det mykere
    let gradient = ctx.createRadialGradient(centerX, centerY, tileSize, centerX, centerY, tileSize * viewDist);
    gradient.addColorStop(0, "transparent");
    gradient.addColorStop(1, "black");
    ctx.fillStyle = gradient;
    ctx.fillRect(0,0, canvas.width, canvas.height);
}

draw();
</script>
</body>
</html>
