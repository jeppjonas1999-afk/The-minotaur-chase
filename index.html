<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Labyrint 2D</title>
    <style>
        :root {
            /* Her definerer vi skalaen (Nivå 3 = 750px i denne skalaen) */
            --map-size: 750px; 
            --grid-cells: 50; /* Antall ruter i bredden */
            --cell-size: calc(var(--map-size) / var(--grid-cells));
        }

        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* LOBBY LOGIKK */
        #game-trigger, #interact-trigger { display: none; }

        #lobby {
            position: absolute;
            z-index: 100;
            background: #222;
            padding: 20px;
            border: 2px solid #555;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
        }

        /* NÅR SPILLET STARTER */
        #game-trigger:checked ~ #lobby { display: none; }
        #game-trigger:checked ~ #game-viewport { display: block; }

        /* VIEWPORT - Dette er "kameraet" ditt */
        #game-viewport {
            display: none;
            width: 100vw;
            height: 100vh;
            overflow: auto; /* Gjør at man må lete/scrolle for å se kartet */
            position: relative;
            cursor: crosshair;
        }

        /* LABYRINT-KARTET */
        .map-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cells), var(--cell-size));
            grid-template-rows: repeat(var(--grid-cells), var(--cell-size));
            width: var(--map-size);
            height: var(--map-size);
            background: #111;
            /* Plasserer spilleren i midten ved start */
            margin: 50vh 50vw; 
        }

        /* VEGGER (Vi bruker mønster-gjentakelse for å simulere labyrint uten JS) */
        .cell {
            width: var(--cell-size);
            height: var(--cell-size);
            box-sizing: border-box;
            border: 0.1px solid #222;
        }

        /* Dette simulerer en labyrint ved å fargelegge tilfeldige ruter */
        .cell:nth-child(3n+1), .cell:nth-child(7n) {
            background: #333; /* Vegg */
        }

        /* DET TOMME 10x10 ROMMET I MIDTEN */
        /* Vi bruker CSS "Grid Area" for å tvinge midten til å være tom */
        .center-room {
            grid-column: 20 / 30; /* Ca midten av 50 ruter */
            grid-row: 20 / 30;
            background: #444 !important;
            border: 2px solid #00ff00;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* DØR BAK DEG */
        .door {
            width: 30px;
            height: 10px;
            background: brown;
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
        }

        /* INTERAKSJONSKNAPP (E / Mobil) */
        .interact-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: orange;
            color: black;
            padding: 20px;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            z-index: 200;
        }

        /* DIALOGBOBLE */
        .dialog {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border: 2px solid white;
            display: none;
            z-index: 300;
        }

        #interact-trigger:checked ~ .dialog { display: block; }

        /* SKALA-VELGER STIL */
        .scale-option {
            display: inline-block;
            padding: 10px;
            background: #444;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <input type="checkbox" id="game-trigger">
    <input type="checkbox" id="interact-trigger">

    <div id="lobby">
        <h2>Labyrint Utforsker</h2>
        <p>Velg Kartstørrelse (1-5)</p>
        <div style="margin-bottom: 20px;">
            <span class="scale-option">1</span>
            <span class="scale-option">2</span>
            <span class="scale-option" style="background: #00ff00; color: black;">3</span>
            <span class="scale-option">4</span>
            <span class="scale-option">5</span>
        </div>
        <label for="game-trigger" style="background: white; color: black; padding: 10px 20px; cursor: pointer; font-weight: bold;">START SPILL</label>
    </div>

    <div id="game-viewport">
        <div class="map-grid">
            <script>
                // Jeg bruker en liten hjelpe-løkke kun for å slippe å skrive 2500 linjer med <div> manuelt, 
                // men resultatet er ren HTML i browseren din.
                for(let i=0; i<2500; i++) {
                    document.write('<div class="cell"></div>');
                }
            </script>
            
            <div class="center-room">
                <div class="door"></div>
                <span style="font-size: 10px;">START</span>
            </div>
        </div>

        <label for="interact-trigger" class="interact-btn">E</label>

        <div class="dialog">
            Den er låst.
            <br>
            <label for="interact-trigger" style="color: red; cursor: pointer;">[Lukk]</label>
        </div>
    </div>

</body>
</html>
