<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: Shadow & Stealth</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        
        /* MENY-LAYOUT (TILBAKESTILT) */
        #menu-wrapper { display: flex; position: relative; align-items: stretch; }
        .box { border: 2px solid #333; padding: 40px; background: #111; width: 400px; text-align: center; position: relative; z-index: 2; }
        
        #modifiers-panel { display: none; width: 420px; background: #111; border: 2px solid #333; border-left: none; padding: 20px; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: start; box-sizing: border-box; }
        #expand-btn { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; color: #fff; font-size: 30px; cursor: pointer; border-radius: 0 10px 10px 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        
        .menu-label { display: block; text-align: left; margin-top: 15px; font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        select, .start-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 5px; cursor: pointer; font-size: 16px; font-family: inherit; }
        .start-btn { margin-top: 25px; background: #200; border-color: #500; font-weight: bold; transition: 0.2s; }
        .start-btn:hover { background: #500; border-color: #f00; }

        /* MOD-KORT STIL */
        .mod-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .mod-img { background: #fff; width: 100%; aspect-ratio: 1.8 / 1; position: relative; border: 1px solid #444; }
        .mod-title { position: absolute; bottom: 2px; width: 100%; text-align: center; color: #000; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .mod-desc { font-size: 10px; color: #aaa; margin: 6px 0; min-height: 24px; }
        .mod-btns { display: flex; gap: 4px; width: 100%; }
        .mod-btns button { padding: 4px; font-size: 12px; flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; font-weight: bold; }
        .mod-card.blank { opacity: 0.15; }

        h1 { letter-spacing: 10px; color: #800; text-shadow: 0 0 10px #f00; margin: 0 0 10px 0; }
        
        /* MINIGAME STIL */
        #mg-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 300px; display: none; z-index: 1001; text-align: center; }
        #mg-bar-bg { width: 100%; height: 20px; background: #111; border: 2px solid #fff; position: relative; overflow: hidden; }
        #mg-bar-fill { height: 100%; width: 50%; background: #0f0; }
        #mg-text { margin-top: 10px; font-weight: bold; letter-spacing: 2px; }

        @keyframes mg-shake {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, 2px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body onload="initMenu()">

    <div id="mg-container">
        <div id="mg-bar-bg"><div id="mg-bar-fill"></div></div>
        <div id="mg-text">HAMRE [W]!</div>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div class="box">
                <h1>MINOTAUR</h1>
                <p id="menu-tip" style="color:#555; font-size:11px; text-transform:uppercase;">Gjem deg i mørket...</p>
                
                <span class="menu-label">Kartstørrelse</span>
                <select id="size">
                    <option value="15">LITEN</option>
                    <option value="25" selected>STOR</option>
                    <option value="45">DIGERT</option>
                </select>

                <span class="menu-label">Vanskelighetsgrad</span>
                <select id="diff">
                    <option value="easy">ENKEL</option>
                    <option value="medium" selected>MEDIUM</option>
                    <option value="hard">VANSKELIG</option>
                </select>

                <button class="start-btn" onclick="start()">START FLUKTEN</button>
            </div>
            
            <div id="modifiers-panel">
                <div class="mod-card">
                    <div class="mod-img"><div class="mod-title">minotaur chaos</div></div>
                    <p class="mod-desc">Flere monstre.<br>De sprer seg ut.</p>
                    <div class="mod-btns">
                        <button id="btn-chaos-1" onclick="toggleChaos(1)">1</button>
                        <button id="btn-chaos-2" onclick="toggleChaos(2)">2</button>
                        <button id="btn-chaos-3" onclick="toggleChaos(3)">3</button>
                        <button id="btn-chaos-4" onclick="toggleChaos(4)">4</button>
                    </div>
                </div>
                <script>for(let i=0; i<8; i++) document.write('<div class="mod-card blank"><div class="mod-img"><div class="mod-title">???</div></div><p class="mod-desc">Låst</p></div>');</script>
            </div>
            <div id="expand-btn" onclick="togglePanel()">+</div>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
let chaosLevel = 0;
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const tileSize = 40;
const moveTime = 320;

let grid = [], hideSpots = [], monsters = [], isRunning = false, lastTime = 0;
let player = { gridX: 1, gridY: 1, renderX: 0, renderY: 0, targetX: 1, targetY: 1, isMoving: false, moveStart: 0, visionRadius: 180, isHiding: false };
let minigame = { active: false, progress: 50, targetKey: 'w' };

function togglePanel() {
    const p = document.getElementById('modifiers-panel');
    const b = document.getElementById('expand-btn');
    const open = p.style.display === 'grid';
    p.style.display = open ? 'none' : 'grid';
    b.innerText = open ? '+' : '-';
}

function toggleChaos(lvl) {
    chaosLevel = (chaosLevel === lvl) ? 0 : lvl;
    for(let i=1; i<=4; i++) document.getElementById('btn-chaos-'+i).className = (i === chaosLevel) ? 'active' : '';
}

function initMenu() {}

function generateMaze(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    function walk(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < dim-1 && nx > 0 && nx < dim-1 && grid[ny][nx] === 1) { grid[y + dy/2][x + dx/2] = 0; walk(nx, ny); }
        }
    }
    walk(1, 1);
}

function spawnExtras(s) {
    hideSpots = [];
    let count = s * 2;
    for(let i=0; i<count; i++) {
        let x, y, tooClose;
        let attempts = 0;
        do {
            x = Math.floor(Math.random()*grid.length); y = Math.floor(Math.random()*grid.length);
            tooClose = hideSpots.some(h => Math.abs(h.x - x) < 10 && Math.abs(h.y - y) < 10);
            attempts++;
        } while((grid[y][x] === 1 || tooClose) && attempts < 100);
        if(attempts < 100) hideSpots.push({x, y});
    }
}

function start() {
    const s = parseInt(document.getElementById("size").value);
    generateMaze(s);
    player.gridX = 1; player.gridY = grid.length - 2;
    player.renderX = player.gridX * tileSize; player.renderY = player.gridY * tileSize;
    spawnExtras(s);
    
    monsters = [];
    for(let i=0; i < (1 + chaosLevel); i++) {
        let mx = Math.floor(grid.length/2), my = Math.floor(grid.length/2);
        monsters.push({
            gridX: mx, gridY: my, renderX: mx*tileSize, renderY: my*tileSize, targetX: mx, targetY: my,
            isMoving: false, moveStart: 0, waitEnd: 0, isAggro: false, lastSeenX: -1, lastSeenY: -1
        });
    }

    document.getElementById("menu").style.display = "none";
    isRunning = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function update(now) {
    if (!isRunning) return;
    let dt = (now - lastTime) / 1000; lastTime = now;

    if (minigame.active) {
        minigame.progress -= (15 + chaosLevel * 5) * dt;
        const bar = document.getElementById("mg-bar-fill");
        const cont = document.getElementById("mg-container");
        bar.style.width = minigame.progress + "%";
        bar.style.background = `rgb(${255 * (1 - minigame.progress/100)}, ${255 * (minigame.progress/100)}, 0)`;
        
        if(minigame.progress < 30) cont.style.animation = "mg-shake 0.1s infinite";
        else cont.style.animation = "none";

        if (minigame.progress <= 0) location.reload();
        if (minigame.progress >= 100) { 
            minigame.active = false; player.isHiding = false; 
            document.getElementById("mg-container").style.display = "none";
            monsters.forEach(m => { m.isAggro = false; m.lastSeenX = -1; m.waitEnd = now + 2000; });
        }
    }

    monsters.forEach((m, idx) => {
        if(!m.isMoving && now > m.waitEnd) {
            let tx = m.lastSeenX === -1 ? Math.floor(Math.random()*grid.length) : m.lastSeenX;
            let ty = m.lastSeenY === -1 ? Math.floor(Math.random()*grid.length) : m.lastSeenY;
            
            // Unngå klumping
            monsters.forEach((other, oi) => {
                if(idx !== oi && Math.abs(tx - other.gridX) < 5) tx = (tx + 10) % grid.length;
            });

            let dx = Math.sign(tx - m.gridX), dy = Math.sign(ty - m.gridY);
            let nx = m.gridX, ny = m.gridY;
            if(Math.random() > 0.5 && dx !== 0 && grid[m.gridY][m.gridX+dx] === 0) nx += dx;
            else if(dy !== 0 && grid[m.gridY+dy][m.gridX] === 0) ny += dy;

            if(nx !== m.gridX || ny !== m.gridY) { m.isMoving = true; m.moveStart = now; m.targetX = nx; m.targetY = ny; }
            else m.waitEnd = now + 400;
        }
        if(m.isMoving) {
            let t = Math.min((now - m.moveStart)/moveTime, 1);
            m.renderX = (m.gridX + (m.targetX - m.gridX)*t)*tileSize;
            m.renderY = (m.gridY + (m.targetY - m.gridY)*t)*tileSize;
            if(t===1) { m.gridX = m.targetX; m.gridY = m.targetY; m.isMoving = false; }
        }
    });

    if(!player.isHiding && !player.isMoving) {
        let dx=0, dy=0; if(keys['w'])dy=-1; if(keys['s'])dy=1; if(keys['a'])dx=-1; if(keys['d'])dx=1;
        if(dx!==0||dy!==0) {
            let nx = player.gridX+dx, ny = player.gridY+dy;
            if(grid[ny] && grid[ny][nx] === 0) { player.isMoving = true; player.moveStart = now; player.targetX = nx; player.targetY = ny; }
        }
    } else if(player.isMoving) {
        let t = Math.min((now - player.moveStart)/moveTime, 1);
        player.renderX = (player.gridX + (player.targetX - player.gridX)*t)*tileSize;
        player.renderY = (player.gridY + (player.targetY - player.gridY)*t)*tileSize;
        if(t===1) { player.gridX = player.targetX; player.gridY = player.targetY; player.isMoving = false; }
    }

    if(!player.isHiding && monsters.some(m => Math.hypot(m.renderX - player.renderX, m.renderY - player.renderY) < 30)) location.reload();
}

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ox = canvas.width/2 - player.renderX - 20, oy = canvas.height/2 - player.renderY - 20;

    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) {
        if(grid[y][x] === 1) { ctx.fillStyle = "#111"; ctx.fillRect(x*tileSize+ox, y*tileSize+oy, tileSize, tileSize); }
    }

    hideSpots.forEach(s => {
        ctx.fillStyle = "#040"; ctx.fillRect(s.x*tileSize+ox+10, s.y*tileSize+oy+10, 20, 20);
    });

    monsters.forEach(m => {
        ctx.fillStyle = "#700"; ctx.beginPath(); ctx.arc(m.renderX+ox+20, m.renderY+oy+20, 15, 0, Math.PI*2); ctx.fill();
    });

    if(!player.isHiding) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, Math.PI*2); ctx.fill(); }

    // FOG OF WAR
    let t = document.createElement('canvas'); t.width = canvas.width; t.height = canvas.height;
    let tc = t.getContext('2d'); tc.fillStyle = "black"; tc.fillRect(0,0,t.width,t.height);
    
    tc.globalCompositeOperation = "destination-out";
    let vRad = player.isHiding ? 400 : player.visionRadius;
    let g = tc.createRadialGradient(t.width/2, t.height/2, 0, t.width/2, t.height/2, vRad);
    g.addColorStop(0, "white"); g.addColorStop(1, "transparent");
    tc.fillStyle = g; tc.beginPath(); tc.arc(t.width/2, t.height/2, vRad, 0, Math.PI*2); tc.fill();

    // 50% Fog over søppelkasser
    hideSpots.forEach(s => {
        tc.fillStyle = "rgba(255, 255, 255, 0.5)";
        tc.fillRect(s.x*tileSize+ox-10, s.y*tileSize+oy-10, tileSize+20, tileSize+20);
    });

    ctx.drawImage(t, 0, 0);
    requestAnimationFrame(loop);
}

const keys = {};
window.onkeydown = e => {
    let k = e.key.toLowerCase(); keys[k] = true;
    if(minigame.active && k === minigame.targetKey) {
        minigame.progress += 12;
        minigame.targetKey = ['w','a','s','d'][Math.floor(Math.random()*4)];
        document.getElementById("mg-text").innerText = `HAMRE [${minigame.targetKey.toUpperCase()}]!`;
    }
    if(k === 'e' && !player.isMoving) {
        if(hideSpots.some(s => s.x === player.gridX && s.y === player.gridY) && !player.isHiding) {
            player.isHiding = true; minigame.active = true; minigame.progress = 50;
            document.getElementById("mg-container").style.display = "block";
        }
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
</script>
</body>
</html>
