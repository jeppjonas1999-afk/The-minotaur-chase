<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Labyrint: Minotaurens Jakt</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        #menu {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }
        .box { border: 2px solid #0f0; padding: 30px; background: #050505; width: 350px; text-align: center; }
        h1 { text-shadow: 0 0 10px #0f0; font-size: 28px; }
        label { display: block; margin-top: 15px; color: #0a0; font-size: 12px; text-align: left; }
        select, button { width: 100%; padding: 10px; background: #000; color: #0f0; border: 1px solid #0f0; margin-top: 5px; cursor: pointer; }
        button:hover { background: #0f0; color: #000; }
        #ui { position: absolute; bottom: 10px; left: 10px; pointer-events: none; display: none; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="box">
            <h1>MINOTAURUS</h1>
            <label>STØRRELSE PÅ LABYRINT</label>
            <select id="size">
                <option value="15">Liten</option>
                <option value="25" selected>Medium</option>
                <option value="35">Stor</option>
            </select>
            <label>VANSKELIGHETSGRAD</label>
            <select id="diff">
                <option value="easy">ENKEL (Sakte fiende, stor sirkel)</option>
                <option value="medium" selected>MEDIUM (Litt raskere)</option>
                <option value="hard">VANSKELIG (Rask fiende, nøyaktig)</option>
            </select>
            <button onclick="start()">INITIALISER SYSTEM</button>
        </div>
    </div>

    <div id="ui">WASD: BEVEGELSE | E: UTGANG</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let grid = [];
let tileSize = 40;
let player = { x: 0, y: 0, speed: 4 };
let monster = { x: 0, y: 0, speed: 0, targetX: 0, targetY: 0, radius: 0 };
let mapDim = 0;
let isRunning = false;
let difficulty = {};

const settings = {
    easy:   { mSpeed: 3.5, precision: 30 * 40 }, // 30 blokker
    medium: { mSpeed: 4.2, precision: 15 * 40 }, // 15 blokker
    hard:   { mSpeed: 6.4, precision: 7 * 40 }   // 7 blokker
};

function start() {
    const s = parseInt(document.getElementById("size").value);
    const d = document.getElementById("diff").value;
    difficulty = settings[d];
    
    generateMaze(s);
    
    // Plasser spiller nede til venstre
    player.x = tileSize * 2.5;
    player.y = (grid.length - 3) * tileSize + tileSize/2;
    
    // Plasser monster i midten
    monster.x = (grid[0].length / 2) * tileSize;
    monster.y = (grid.length / 2) * tileSize;
    monster.speed = difficulty.mSpeed;
    monster.radius = difficulty.precision;

    document.getElementById("menu").style.display = "none";
    document.getElementById("ui").style.display = "block";
    isRunning = true;
    requestAnimationFrame(loop);
}

function generateMaze(size) {
    let base = size * 2 + 1;
    grid = Array.from({length: base}, () => Array(base).fill(1));

    function carve(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < base-1 && nx > 0 && nx < base-1 && grid[ny][nx] === 1) {
                // Gjør gangene 2 ruter brede
                grid[ny][nx] = 0;
                grid[ny][nx+1] = 0;
                grid[ny+1][nx] = 0;
                grid[ny+1][nx+1] = 0;
                grid[y+dy/2][x+dx/2] = 0;
                grid[y+dy/2][x+dx/2+1] = 0;
                carve(nx, ny);
            }
        }
    }
    carve(1, 1);
    
    // Sentralt rom
    let m = Math.floor(base/2);
    for(let y=m-2; y<=m+2; y++) {
        for(let x=m-2; x<=m+2; x++) grid[y][x] = 0;
    }
}

const keys = {};
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

function isWall(x, y) {
    let gx = Math.floor(x / tileSize);
    let gy = Math.floor(y / tileSize);
    return !grid[gy] || grid[gy][gx] === 1;
}

function update() {
    // Spiller bevegelse
    let dx = 0, dy = 0;
    if(keys['w'] || keys['arrowup']) dy -= player.speed;
    if(keys['s'] || keys['arrowdown']) dy += player.speed;
    if(keys['a'] || keys['arrowleft']) dx -= player.speed;
    if(keys['d'] || keys['arrowright']) dx += player.speed;

    if(!isWall(player.x + dx, player.y)) player.x += dx;
    if(!isWall(player.x, player.y + dy)) player.y += dy;

    // Monster AI (Sirkel-logikk)
    // Monsteret oppdaterer målet sitt til et tilfeldig punkt inni sirkelen rundt spilleren
    if(Math.random() < 0.05) { // Endre mål av og til
        let angle = Math.random() * Math.PI * 2;
        let r = Math.random() * monster.radius;
        monster.targetX = player.x + Math.cos(angle) * r;
        monster.targetY = player.y + Math.sin(angle) * r;
    }

    let mdx = monster.targetX - monster.x;
    let mdy = monster.targetY - monster.y;
    let dist = Math.sqrt(mdx*mdx + mdy*mdy);
    
    if(dist > 5) {
        monster.x += (mdx/dist) * monster.speed;
        monster.y += (mdy/dist) * monster.speed;
    }

    // Sjekk om tatt
    let pDist = Math.sqrt((player.x - monster.x)**2 + (player.y - monster.y)**2);
    if(pDist < 20) {
        alert("FANGET AV MINOTAUREN!");
        location.reload();
    }
}

function loop() {
    if(!isRunning) return;
    update();
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    
    const offX = canvas.width/2 - player.x;
    const offY = canvas.height/2 - player.y;

    // Tegn gulv og vegger
    for(let y=0; y<grid.length; y++) {
        for(let x=0; x<grid[y].length; x++) {
            if(grid[y][x] === 1) {
                ctx.fillStyle = "#111";
                ctx.fillRect(x*tileSize+offX, y*tileSize+offY, tileSize, tileSize);
            } else {
                ctx.strokeStyle = "#020";
                ctx.strokeRect(x*tileSize+offX, y*tileSize+offY, tileSize, tileSize);
            }
        }
    }

    // Tegn Monster (Rød prikk)
    ctx.shadowBlur = 15; ctx.shadowColor = "red";
    ctx.fillStyle = "red";
    ctx.beginPath(); ctx.arc(monster.x+offX, monster.y+offY, 12, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // Tegn Spiller (Cyan prikk)
    ctx.fillStyle = "#0ff";
    ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, Math.PI*2); ctx.fill();

    // Among Us Skygger (Forenklet for ytelse)
    let grad = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 50, canvas.width/2, canvas.height/2, 300);
    grad.addColorStop(0, "rgba(0,0,0,0)");
    grad.addColorStop(1, "rgba(0,0,0,1)");
    ctx.fillStyle = grad;
    ctx.globalCompositeOperation = "multiply";
    ctx.fillRect(0,0,canvas.width, canvas.height);
    ctx.globalCompositeOperation = "source-over";

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
