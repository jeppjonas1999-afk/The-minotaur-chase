<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Eternal Hunt</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .box { border: 2px solid #333; padding: 40px; background: #111; width: 400px; text-align: center; }
        h1 { letter-spacing: 10px; color: #800; text-shadow: 0 0 10px #f00; margin: 0; }
        
        select, button { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 10px; cursor: pointer; font-size: 16px; }
        button:hover { background: #300; border-color: #f00; }

        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; justify-content: center; align-items: center; overflow: hidden; }
        .scare-face { width: 100%; height: 100%; background: radial-gradient(circle, #f00 0%, #000 70%); display: flex; justify-content: center; align-items: center; animation: shake 0.1s infinite; }
        
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -10px); } 100% { transform: translate(5px, 5px); } }

        #victory-screen { display: none; background: rgba(0, 50, 0, 0.9); }
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid #444; display: none; z-index: 50; }
    </style>
</head>
<body>

    <div id="menu" class="overlay">
        <div class="box">
            <h1>MINOTAUR</h1>
            <p style="color: #666; font-size: 11px;">PASS DEG NÅR PILENE SPINNER...</p>
            <select id="size">
                <option value="15">LITEN</option>
                <option value="25" selected>STOR</option>
                <option value="45">DIGERT</option>
            </select>
            <select id="diff">
                <option value="easy">ENKEL</option>
                <option value="medium" selected>MEDIUM</option>
                <option value="hard">VANSKELIG</option>
            </select>
            <button onclick="start()">START FLUKTEN</button>
        </div>
    </div>

    <div id="jumpscare">
        <div class="scare-face"><h1 style="font-size: 80px; color: #fff;">FANGET!</h1></div>
    </div>

    <div id="victory-screen" class="overlay">
        <div class="box" style="border-color: #0f0;"><h1 style="color: #0f0;">FRIHET</h1><button onclick="location.reload()">SPILL IGJEN</button></div>
    </div>

    <div id="prompt">TRYKK [E]</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const tileSize = 40;
const moveTime = 350;

let grid = [];
let isRunning = false;
let player = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, visionRadius: 180 };
let monster = { 
    gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, 
    isMoving: false, moveStart: 0, waitEnd: 0, baseSpeedMult: 1,
    abilityActive: false, nextAbilityTime: 0, speedBoost: 1, 
    scentX: -1, scentY: -1, rotation: 0
};
let items = [], placedLights = [], exit = {x:0, y:0};

const diffSettings = {
    easy: { mSpeed: 0.8, abMin: 60000, abMax: 90000 },
    medium: { mSpeed: 1.1, abMin: 45000, abMax: 75000 },
    hard: { mSpeed: 1.7, abMin: 20000, abMax: 45000 }
};

let currentSettings;

function start() {
    const s = parseInt(document.getElementById("size").value);
    currentSettings = diffSettings[document.getElementById("diff").value];
    generateMaze(s);
    player.gridX = 1; player.gridY = grid.length - 2;
    player.renderX = player.gridX * tileSize; player.renderY = player.gridY * tileSize;
    player.targetX = player.gridX; player.targetY = player.gridY;
    
    monster.gridX = Math.floor(grid[0].length / 2); monster.gridY = Math.floor(grid.length / 2);
    if(grid[monster.gridY][monster.gridX] === 1) monster.gridX++;
    monster.renderX = monster.gridX * tileSize; monster.renderY = monster.gridY * tileSize;
    monster.targetX = monster.gridX; monster.targetY = monster.gridY;
    monster.baseSpeedMult = currentSettings.mSpeed;
    
    setNextAbility(performance.now());
    document.getElementById("menu").style.display = "none";
    isRunning = true;
    requestAnimationFrame(loop);
}

function setNextAbility(now) {
    const delay = Math.random() * (currentSettings.abMax - currentSettings.abMin) + currentSettings.abMin;
    monster.nextAbilityTime = now + delay;
}

function generateMaze(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    function walk(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < dim-1 && nx > 0 && nx < dim-1 && grid[ny][nx] === 1) {
                grid[y + dy/2][x + dx/2] = 0; walk(nx, ny);
            }
        }
    }
    walk(1, 1);
    exit = { x: dim - 2, y: 1 }; grid[exit.y][exit.x] = 0;
}

function spawnItems(size) {
    items = [];
    for(let i=0; i < Math.floor(size/1.5); i++) {
        let rx, ry;
        do { rx = Math.floor(Math.random()*grid[0].length); ry = Math.floor(Math.random()*grid.length); } 
        while(grid[ry][rx] === 1);
        items.push({x: rx, y: ry, type: Math.random() > 0.4 ? 'orange' : 'yellow'});
    }
}

function update(now) {
    if (!isRunning) return;

    // --- ABILITY AKTIVERING ---
    if (now > monster.nextAbilityTime && !monster.abilityActive) {
        monster.abilityActive = true;
        monster.waitEnd = now + 2500; 
        monster.scentX = player.gridX; // Låser lukten til din nåværende posisjon
        monster.scentY = player.gridY;
        
        setTimeout(() => {
            monster.speedBoost = 1.6; // Kraftig boost
        }, 2500);
    }

    // Sjekk om han har nådd lukte-punktet
    if (monster.gridX === monster.scentX && monster.gridY === monster.scentY) {
        monster.abilityActive = false;
        monster.speedBoost = 1.0;
        monster.scentX = -1;
        setNextAbility(performance.now());
    }

    // Spillerkontroll
    if (!player.isMoving) {
        let dx = 0, dy = 0;
        if (keys['w'] || keys['arrowup']) dy = -1;
        else if (keys['s'] || keys['arrowdown']) dy = 1;
        else if (keys['a'] || keys['arrowleft']) dx = -1;
        else if (keys['d'] || keys['arrowright']) dx = 1;
        if (dx !== 0 || dy !== 0) {
            let nx = player.gridX + dx, ny = player.gridY + dy;
            if (grid[ny] && grid[ny][nx] === 0) {
                player.isMoving = true; player.moveStart = now;
                player.targetX = nx; player.targetY = ny;
            }
        }
    } else {
        let t = Math.min((now - player.moveStart) / moveTime, 1);
        player.renderX = (player.gridX + (player.targetX - player.gridX) * t) * tileSize;
        player.renderY = (player.gridY + (player.targetY - player.gridY) * t) * tileSize;
        if (t === 1) { player.isMoving = false; player.gridX = player.targetX; player.gridY = player.targetY; }
    }

    // Monster AI
    if (!monster.isMoving && now > monster.waitEnd) {
        // Hvis han har en lukt, går han dit. Ellers går han til spilleren.
        let targetX = monster.scentX !== -1 ? monster.scentX : player.gridX;
        let targetY = monster.scentY !== -1 ? monster.scentY : player.gridY;

        let queue = [{x: monster.gridX, y: monster.gridY, path: []}];
        let visited = new Set([`${monster.gridX},${monster.gridY}`]);
        let next = null;

        while(queue.length > 0) {
            let curr = queue.shift();
            if(curr.x === targetX && curr.y === targetY) { next = curr.path[0]; break; }
            [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx, dy]) => {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(grid[ny] && grid[ny][nx] === 0 && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`);
                    queue.push({x: nx, y: ny, path: [...curr.path, {x: nx, y: ny}]});
                }
            });
        }
        if (next) {
            monster.isMoving = true; monster.moveStart = now;
            monster.targetX = next.x; monster.targetY = next.y;
            
            // 50% sjanse for pause i kryss (ikke i jakt)
            if (monster.scentX === -1 && Math.random() < 0.5) {
                let paths = 0;
                [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => { if(grid[monster.gridY+dy] && grid[monster.gridY+dy][monster.gridX+dx] === 0) paths++; });
                if(paths > 2) monster.waitEnd = now + 750;
            }
        }
    } else if (monster.isMoving) {
        let t = Math.min((now - monster.moveStart) / (moveTime / (monster.baseSpeedMult * monster.speedBoost)), 1);
        monster.renderX = (monster.gridX + (monster.targetX - monster.gridX) * t) * tileSize;
        monster.renderY = (monster.gridY + (monster.targetY - monster.gridY) * t) * tileSize;
        if (t === 1) { monster.isMoving = false; monster.gridX = monster.targetX; monster.gridY = monster.targetY; }
    }

    if (Math.abs(player.renderX - monster.renderX) < 25 && Math.abs(player.renderY - monster.renderY) < 25) { 
        isRunning = false; document.getElementById("jumpscare").style.display = "flex";
        setTimeout(() => location.reload(), 2000);
    }
    if (player.gridX === exit.x && player.gridY === exit.y) { isRunning = false; document.getElementById("victory-screen").style.display = "flex"; }
    
    monster.rotation += 0.15; // Roteringsfart for pilene
}

function loop(now) {
    if(!isRunning) return;
    update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const offX = canvas.width/2 - player.renderX - 20; const offY = canvas.height/2 - player.renderY - 20;

    // 1. Kart og objekter
    ctx.fillStyle = "#050505"; ctx.fillRect(0,0, canvas.width, canvas.height);
    for(let y=0; y<grid.length; y++) {
        for(let x=0; x<grid[y].length; x++) {
            if(grid[y][x] === 1) { ctx.fillStyle = "#1a1a1a"; ctx.fillRect(x*tileSize+offX, y*tileSize+offY, tileSize, tileSize); }
        }
    }
    items.forEach(it => {
        ctx.fillStyle = it.type === 'orange' ? "#ffa500" : "#ffff00";
        ctx.beginPath(); ctx.arc(it.x*tileSize+offX+20, it.y*tileSize+offY+20, 8, 0, Math.PI*2); ctx.fill();
    });
    ctx.fillStyle = "#0f0"; ctx.fillRect(exit.x*tileSize+offX+10, exit.y*tileSize+offY+10, 20, 20);
    ctx.fillStyle = monster.speedBoost > 1 ? "#f00" : "#600";
    ctx.beginPath(); ctx.arc(monster.renderX+offX+20, monster.renderY+offY+20, 14, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, Math.PI*2); ctx.fill();

    // 2. Mørke-maske (Fog of War)
    let temp = document.createElement('canvas'); temp.width = canvas.width; temp.height = canvas.height;
    let tCtx = temp.getContext('2d');
    tCtx.fillStyle = "rgba(0,0,0,0.98)"; tCtx.fillRect(0,0,canvas.width,canvas.height);
    tCtx.globalCompositeOperation = "destination-out";
    let pG = tCtx.createRadialGradient(canvas.width/2, canvas.height/2, 10, canvas.width/2, canvas.height/2, player.visionRadius);
    pG.addColorStop(0, "white"); pG.addColorStop(1, "transparent");
    tCtx.fillStyle = pG; tCtx.beginPath(); tCtx.arc(canvas.width/2, canvas.height/2, player.visionRadius, 0, Math.PI*2); tCtx.fill();
    placedLights.forEach(l => {
        let lx = l.x*tileSize+offX+20, ly = l.y*tileSize+offY+20;
        let lG = tCtx.createRadialGradient(lx, ly, 10, lx, ly, 160);
        lG.addColorStop(0, "white"); lG.addColorStop(1, "transparent");
        tCtx.fillStyle = lG; tCtx.beginPath(); tCtx.arc(lx, ly, 160, 0, Math.PI*2); tCtx.fill();
    });
    ctx.drawImage(temp, 0, 0);

    // 3. X-RAY PILER (Tegnes ETTER mørket slik at de synes gjennom alt)
    if (monster.abilityActive) {
        const mx = monster.renderX + offX + 20; const my = monster.renderY + offY + 20;
        ctx.save();
        ctx.translate(mx, my);
        ctx.rotate(monster.rotation);
        ctx.strokeStyle = "#f00";
        ctx.lineWidth = 4;
        ctx.shadowBlur = 15;
        ctx.shadowColor = "red";
        
        for(let i=0; i<4; i++) {
            ctx.rotate(Math.PI/2);
            ctx.beginPath();
            ctx.moveTo(30, 0); ctx.lineTo(60, 0); // Linje ut
            ctx.moveTo(50, -10); ctx.lineTo(60, 0); ctx.lineTo(50, 10); // Pilspiss
            ctx.stroke();
        }
        ctx.restore();
    }

    requestAnimationFrame(loop);
}

const keys = {};
window.onkeydown = e => keys[e.key.toLowerCase()] = true;
window.onkeyup = e => {
    keys[e.key.toLowerCase()] = false;
    if(e.key.toLowerCase() === 'e') {
        let i = items.findIndex(it => it.x === player.gridX && it.y === player.gridY);
        if(i !== -1) {
            if(items[i].type === 'orange') placedLights.push({x: player.gridX, y: player.gridY});
            else player.visionRadius += 60;
            items.splice(i, 1);
        }
    }
};
</script>
</body>
</html>
