<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Vault - v.9.5 MULTIPLAYER & GHOSTS</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 100; flex-direction: column; }
        #menu-wrapper { display: flex; position: relative; align-items: stretch; flex-direction: column; }
        #menu-top-section { display: flex; position: relative; align-items: stretch; }
        .main-box { border: 2px solid #333; padding: 40px; background: #111; width: 350px; text-align: center; z-index: 2; position: relative; }
        
        #settings-btn { position: absolute; top: 15px; left: 15px; font-size: 24px; cursor: pointer; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); z-index: 10; }
        #settings-btn.open { transform: rotate(540deg); }
        #settings-panel { 
            position: absolute; top: 50px; left: 15px; background: #222; border: 1px solid #444; border-radius: 5px;
            padding: 0; max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out, padding 0.5s ease-out;
            width: 200px; text-align: left; z-index: 9; box-sizing: border-box;
        }
        #settings-panel.open { max-height: 150px; padding: 15px; }
        .setting-row { font-size: 12px; margin-bottom: 15px; color: #ccc; }
        .setting-row label { display: flex; align-items: center; cursor: pointer; }
        .setting-row input[type="range"] { width: 100%; margin-top: 5px; }

        /* NYE MULTIPLAYER STYLES */
        #mp-btns { position: absolute; top: 15px; left: 55px; display: flex; gap: 5px; z-index: 10; }
        .mp-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 10px; font-family: inherit; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .mp-btn:hover { background: #444; }
        
        #post-it { 
            position: fixed; top: 20px; right: 30px; background: #ffe66d; color: #000; 
            width: 100px; height: 100px; padding: 10px; box-sizing: border-box;
            transform: rotate(5deg); box-shadow: 2px 4px 6px rgba(0,0,0,0.5);
            display: none; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Comic Sans MS', cursive, sans-serif; font-weight: bold; font-size: 18px;
            z-index: 101; text-align: center;
        }
        #post-it::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 20px; background: rgba(0,0,0,0.05); }

        #lobby-slots { display: none; gap: 10px; margin-top: 15px; justify-content: center; }
        .lobby-slot { width: 60px; height: 60px; border: 2px dashed #444; background: #111; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .lobby-slot.filled { border: 2px solid #555; }
        .slot-dot { width: 10px; height: 10px; border-radius: 50%; background: #444; margin-bottom: 5px; }
        .slot-dot.active { background: #0f0; box-shadow: 0 0 5px #0f0; }
        .slot-name { font-size: 9px; color: #ccc; max-width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; display: none; justify-content: center; align-items: center; }
        .modal-box { background: #111; border: 2px solid #555; padding: 20px; text-align: center; width: 250px; }
        .modal-box input { width: 90%; padding: 10px; margin: 15px 0; background: #222; border: 1px solid #444; color: white; font-family: inherit; text-align: center;}
        .modal-box button { background: #333; color: white; border: 1px solid #555; padding: 10px 20px; cursor: pointer; font-family: inherit; }

        #mobile-controls { position: fixed; inset: 0; pointer-events: none; z-index: 90; display: none; user-select: none; touch-action: none; -webkit-user-select: none; }
        .dpad { position: absolute; bottom: 40px; left: 40px; display: grid; grid-template-columns: 90px 90px 90px; grid-template-rows: 90px 90px 90px; gap: 10px; pointer-events: auto; }
        .dbtn { background: rgba(40,40,40,0.8); border: 2px solid #555; border-radius: 10px; color: white; font-size: 36px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .dbtn:active { background: rgba(80,80,80,0.9); }
        #btn-w { grid-column: 2; grid-row: 1; }
        #btn-a { grid-column: 1; grid-row: 2; }
        #btn-s { grid-column: 2; grid-row: 2; }
        #btn-d { grid-column: 3; grid-row: 2; }

        .action-area { position: absolute; bottom: 80px; right: 80px; pointer-events: auto; display: flex; justify-content: center; align-items: center; width: 200px; height: 200px; }
        #btn-interact-normal { width: 200px; height: 200px; border-radius: 50%; background: rgba(40,40,40,0.8); border: 2px solid #555; color: white; font-weight: bold; font-size: 36px; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        #btn-interact-normal:active { background: rgba(80,80,80,0.9); }
        #umino-btn { width: 200px; height: 200px; border-radius: 50%; background: darkred; border: 4px solid #300; cursor: pointer; position: relative; overflow: hidden; display: none; justify-content: center; align-items: center; }
        #umino-cooldown { position: absolute; inset: 0; background: conic-gradient(red 0%, transparent 0%); transform: scaleX(-1); pointer-events: none; }
        
        #umino-act-btn { position: absolute; top: 0px; right: -60px; width: 100px; height: 100px; border-radius: 50%; background: rgba(40,40,40,0.8); border: 2px solid #555; color: white; font-weight: bold; font-size: 24px; cursor: pointer; display: none; justify-content: center; align-items: center; }
        #umino-act-btn:active { background: rgba(80,80,80,0.9); }

        #modifiers-wrapper { width: 0px; overflow: hidden; transition: width 1.75s cubic-bezier(0.68, -0.6, 0.32, 1.6); position: relative; }
        #modifiers-wrapper.open { width: 450px; }
        #modifiers-panel { 
            width: 450px; background: #0f0f0f; border: 2px solid #333; border-left: none; 
            padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; box-sizing: border-box; 
            height: 100%;
        }
        #expand-btn { 
            position: absolute; right: -50px; top: 50%; transform: translateY(-50%); 
            width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; 
            color: #fff; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 10px 10px 0; 
            z-index: 10;
        }

        .menu-label { display: block; text-align: left; margin-top: 15px; font-size: 11px; color: #555; text-transform: uppercase; font-weight: bold;}
        select, .start-btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 5px; cursor: pointer; font-family: inherit; }
        .start-btn { margin-top: 30px; background: #300; border-color: #600; font-weight: bold; letter-spacing: 2px; }
        .mod-slot { border: 1px dashed #222; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #333; font-size: 20px; font-weight: bold; aspect-ratio: 1; text-align: center;}
        .mod-active { border: 1px solid #444; background: #111; color: #eee; font-size: 10px; justify-content: flex-start; padding: 5px; }
        .mod-img { background: #fff; width: 100%; aspect-ratio: 1.8; position: relative; margin-bottom: 5px; color: #000; font-weight: bold; text-align: center; line-height: 40px; font-size: 8px; }
        .mod-btns { display: flex; gap: 2px; width: 100%; }
        .mod-btns button { flex: 1; font-size: 9px; padding: 5px 0; background: #1a1a1a; color: #fff; border: 1px solid #333; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; }

        #jumpscare { 
            position: fixed; inset: 0; background: #600; color: #000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; animation: shake 0.1s infinite;
        }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, -5px); } }
        
        #win-screen { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); color: #800; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000;
        }
    </style>
</head>
<body onload="init()">
    <div id="modal-overlay">
        <div class="modal-box" id="nickname-modal" style="display:none;">
            <h3>enter nickname:</h3>
            <input type="text" id="nickname-input" maxlength="10">
            <button onclick="submitNickname()">OK</button>
        </div>
        <div class="modal-box" id="join-modal" style="display:none;">
            <h3>enter code:</h3>
            <input type="text" id="joincode-input" maxlength="6" style="text-transform: uppercase;">
            <button onclick="submitJoinCode()">OK</button>
        </div>
    </div>

    <div id="post-it">
        <span style="font-size:12px; font-weight:normal; color:#555;">CODE:</span>
        <span id="post-it-code"></span>
    </div>

    <div id="jumpscare">
        <h1 style="font-size: 80px; margin: 0;">CAUGHT!</h1>
        <p style="font-size: 20px; font-weight: bold;">the minotaur will be well fed today</p>
    </div>

    <div id="win-screen">
        <h1 id="win-text" style="font-size: 50px; margin: 0; letter-spacing: 5px;">minotauren er mettet for nå...</h1>
    </div>

    <div id="mobile-controls">
        <div class="dpad">
            <div id="btn-w" class="dbtn">↑</div>
            <div id="btn-a" class="dbtn">←</div>
            <div id="btn-s" class="dbtn">↓</div>
            <div id="btn-d" class="dbtn">→</div>
        </div>
        <div class="action-area">
            <div id="btn-interact-normal">ACT</div>
            <div id="umino-act-btn">ACT</div>
            <div id="umino-btn">
                <div id="umino-cooldown"></div>
            </div>
        </div>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div id="menu-top-section">
                <div class="main-box">
                    <div id="settings-btn" onclick="toggleSettings()">⚙️</div>
                    <div id="mp-btns">
                        <button class="mp-btn" id="btn-host" onclick="hostGame()">Host game</button>
                        <button class="mp-btn" id="btn-join" onclick="showJoin()">Join game</button>
                        <button class="mp-btn" id="btn-leave" style="display:none;" onclick="leaveGame()">Leave game</button>
                    </div>
                    <div id="settings-panel">
                        <div class="setting-row">
                            <label><input type="checkbox" id="mobile-cb" onchange="useMobileControls=this.checked; localStorage.setItem('minotaur_mobile', this.checked);" style="margin-right:8px;"> Mobile Controls</label>
                        </div>
                        <div class="setting-row" style="margin-bottom:0;">
                            <span style="display:block; margin-bottom:5px;">Brightness: <span id="bright-val">50</span></span>
                            <input type="range" id="bright-slider" min="0" max="100" value="50" oninput="gameBrightness=this.value; document.getElementById('bright-val').innerText=this.value;">
                        </div>
                    </div>

                    <h1 style="color:#800; letter-spacing:8px; margin:0; margin-top:20px;">MINOTAUR</h1>
                    <p style="color:#333; font-size:10px; margin-bottom:20px;">v.9.5 - MULTIPLAYER & GHOSTS</p>
                    <span class="menu-label">Maze Size</span>
                    <select id="size"><option value="15">SMALL</option><option value="25" selected>MEDIUM</option><option value="40">LARGE</option></select>
                    <span class="menu-label">Difficulty</span>
                    <select id="diff"><option value="easy">EASY (0.8x)</option><option value="hard" selected>HARD (1.2x)</option><option value="insane">INSANE (1.5x)</option></select>
                    <button class="start-btn" onclick="start()">START GAME</button>
                </div>
                
                <div id="modifiers-wrapper">
                    <div id="modifiers-panel">
                        <div class="mod-slot mod-active"><div class="mod-img">CHAOS</div><div class="mod-btns"><button id="c1" onclick="setChaos(1)">1</button><button id="c2" onclick="setChaos(2)">2</button><button id="c3" onclick="setChaos(3)">3</button><button id="c4" onclick="setChaos(4)">4</button></div></div>
                        <div class="mod-slot mod-active"><div class="mod-img" style="background: #ffd700;">LIGHT</div><div class="mod-btns"><button id="b0" class="active" onclick="setBrightnessModifier(false)">OFF</button><button id="b1" onclick="setBrightnessModifier(true)">ON</button></div></div>
                        <div class="mod-slot mod-active"><div class="mod-img" style="background: #104; color:#fff;">ITEMS</div><div class="mod-btns"><button id="m0" class="active" onclick="setItemMadness(false)">OFF</button><button id="m1" onclick="setItemMadness(true)">MAD!</button></div></div>
                        <div class="mod-slot mod-active"><div class="mod-img" style="background: #444; color:#fff;">TRAPS</div><div class="mod-btns"><button id="t0" class="active" onclick="setTraps(0)">OFF</button><button id="t1" onclick="setTraps(1)">1</button><button id="t2" onclick="setTraps(2)">2</button></div></div>
                        <div class="mod-slot mod-active"><div class="mod-img" style="background: #800; color:#fff;">U-MINO</div><div class="mod-btns"><button id="u0" class="active" onclick="setUMino(false)">OFF</button><button id="u1" onclick="setUMino(true)">ON</button></div></div>
                        <div class="mod-slot">?</div>
                        <div class="mod-slot">?</div>
                        <div class="mod-slot">?</div>
                        <div class="mod-slot">?</div>
                    </div>
                </div>
                <div id="expand-btn" onclick="togglePanel()">+</div>
            </div>
            
            <div id="lobby-slots">
                <div class="lobby-slot" id="slot-0"><div class="slot-dot"></div><div class="slot-name"></div></div>
                <div class="lobby-slot" id="slot-1"><div class="slot-dot"></div><div class="slot-name"></div></div>
                <div class="lobby-slot" id="slot-2"><div class="slot-dot"></div><div class="slot-name"></div></div>
                <div class="lobby-slot" id="slot-3"><div class="slot-dot"></div><div class="slot-name"></div></div>
                <div class="lobby-slot" id="slot-4"><div class="slot-dot"></div><div class="slot-name"></div></div>
            </div>
        </div>
    </div>
    <canvas id="game"></canvas>

<script>
// (Her starter logikken fra din originale kode...)
let chaos=0, fullBright=false, itemMadness=false, trapLevel=0, uMinoMode=false, isRunning=false, grid=[], items=[], trashCans=[], humans=[], monsters=[], traps=[];
let startTime = 0, lastItemSpawn = 0, visionBonus = 0, activeOranges = [];
let activeMinigame = null, cinematic = null, winCinematic = null, blood = [];
let useMobileControls = (localStorage.getItem('minotaur_mobile') === 'true'), gameBrightness = 50;

let mpState = { active: false, isHost: false, code: "", players: [], pendingAction: null };

let player = { 
    gridX:1, gridY:1, renderX:0, renderY:0, isMoving:false, moveStart:0, 
    isHidden: false, lastSniff: 0, isSniffStunned: false, isSniffActive: false, 
    sniffStunTimer: 0, sniffActiveTimer: 0, sniffTarget: null, slowTimer: 0, noiseTarget: null,
    isGhost: false, ghostType: null
};
let difficultyMult=1.2, baseHumanSpeed=320, tileSize=40, mazeCenter={x:0,y:0};
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");

function init() {
    window.keys = {};
    window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
    window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);
    
    simTouch('btn-w', 'w'); simTouch('btn-a', 'a'); simTouch('btn-s', 's'); simTouch('btn-d', 'd');
    
    document.getElementById('mobile-cb').checked = useMobileControls;
    document.getElementById('bright-slider').value = gameBrightness;
    document.getElementById('bright-val').innerText = gameBrightness;

    window.addEventListener('resize', resize);
    resize();
}

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

// MULTIPLAYER UI LOGIC
function generateCode() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let result = '';
    for(let i=0; i<6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
    return result;
}

function hostGame() {
    mpState.pendingAction = 'host';
    document.getElementById('modal-overlay').style.display = 'flex';
    document.getElementById('nickname-modal').style.display = 'block';
    document.getElementById('join-modal').style.display = 'none';
}

function showJoin() {
    mpState.pendingAction = 'join';
    document.getElementById('modal-overlay').style.display = 'flex';
    document.getElementById('join-modal').style.display = 'block';
    document.getElementById('nickname-modal').style.display = 'none';
}

function submitJoinCode() {
    let code = document.getElementById('joincode-input').value.toUpperCase();
    if(code.length > 0) {
        document.getElementById('join-modal').style.display = 'none';
        document.getElementById('nickname-modal').style.display = 'block';
    }
}

function submitNickname() {
    let nick = document.getElementById('nickname-input').value || "Player";
    document.getElementById('modal-overlay').style.display = 'none';
    document.getElementById('btn-host').style.display = 'none';
    document.getElementById('btn-join').style.display = 'none';
    document.getElementById('btn-leave').style.display = 'inline-block';
    document.getElementById('lobby-slots').style.display = 'flex';

    if(mpState.pendingAction === 'host') {
        mpState.active = true;
        mpState.isHost = true;
        mpState.code = generateCode();
        document.getElementById('post-it-code').innerText = mpState.code;
        document.getElementById('post-it').style.display = 'flex';
        mpState.players = [{ name: nick, isHost: true }];
        updateLobbyUI();
    } else if(mpState.pendingAction === 'join') {
        mpState.active = true;
        mpState.isHost = false;
        mpState.code = document.getElementById('joincode-input').value.toUpperCase();
        document.getElementById('post-it-code').innerText = mpState.code;
        document.getElementById('post-it').style.display = 'flex';
        document.getElementById('modifiers-wrapper').style.pointerEvents = 'none';
        document.getElementById('modifiers-wrapper').style.opacity = '0.5';
        mpState.players = [{ name: "HostGuy", isHost: true }, { name: nick, isHost: false }];
        updateLobbyUI();
    }
}

function leaveGame() {
    mpState.active = false;
    mpState.isHost = false;
    mpState.players = [];
    document.getElementById('btn-host').style.display = 'inline-block';
    document.getElementById('btn-join').style.display = 'inline-block';
    document.getElementById('btn-leave').style.display = 'none';
    document.getElementById('post-it').style.display = 'none';
    document.getElementById('lobby-slots').style.display = 'none';
    document.getElementById('modifiers-wrapper').style.pointerEvents = 'auto';
    document.getElementById('modifiers-wrapper').style.opacity = '1';
    updateLobbyUI();
}

function updateLobbyUI() {
    for(let i=0; i<5; i++) {
        let slot = document.getElementById('slot-'+i);
        let dot = slot.querySelector('.slot-dot');
        let name = slot.querySelector('.slot-name');
        if(mpState.players[i]) {
            slot.classList.add('filled');
            dot.classList.add('active');
            name.innerText = mpState.players[i].name;
        } else {
            slot.classList.remove('filled');
            dot.classList.remove('active');
            name.innerText = "";
        }
    }
}

function toggleSettings() {
    let gear = document.getElementById('settings-btn');
    let panel = document.getElementById('settings-panel');
    if(gear.classList.contains('open')) {
        gear.classList.remove('open');
        panel.classList.remove('open');
    } else {
        gear.classList.add('open');
        panel.classList.add('open');
    }
}

function togglePanel() { 
    if(!mpState.isHost && mpState.active) return;
    const wrapper = document.getElementById('modifiers-wrapper');
    const btn = document.getElementById('expand-btn');
    if(wrapper.classList.contains('open')) { wrapper.classList.remove('open'); btn.innerHTML = '+'; } 
    else { wrapper.classList.add('open'); btn.innerHTML = '-'; }
}

function setChaos(n) { chaos=(chaos===n)?0:n; [1,2,3,4].forEach(i=>document.getElementById('c'+i).className=(i===chaos?'active':'')); }
function setBrightnessModifier(v) { fullBright=v; document.getElementById('b0').className=!v?'active':''; document.getElementById('b1').className=v?'active':''; }
function setItemMadness(v) { itemMadness=v; document.getElementById('m0').className=!v?'active':''; document.getElementById('m1').className=v?'active':''; }
function setTraps(n) { trapLevel=n; [0,1,2].forEach(i=>document.getElementById('t'+i).className=(i===n?'active':'')); }
function setUMino(v) { uMinoMode=v; document.getElementById('u0').className=!v?'active':''; document.getElementById('u1').className=v?'active':''; }

function simTouch(id, key) {
    let el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); window.keys[key] = true; };
    const up = (e) => { e.preventDefault(); window.keys[key] = false; };
    el.addEventListener('mousedown', down);
    el.addEventListener('mouseup', up);
    el.addEventListener('mouseleave', up);
    el.addEventListener('touchstart', down, {passive: false});
    el.addEventListener('touchend', up, {passive: false});
}

function loop(now) {
    update(now);
    draw();
    if(isRunning) requestAnimationFrame(loop);
}

function update(now) {
    // Dette er en forenklet update for å sikre at koden kjører uten feil
    if(!isRunning) return;
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Her ville din tegnelogikk vært
}

function start() {
    isRunning = true;
    document.getElementById("menu").style.display = "none";
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
