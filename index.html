<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Vault - v.8.0 LOS & UI Update</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; user-select: none; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #menu-wrapper { display: flex; position: relative; align-items: stretch; }
        .main-box { border: 2px solid #333; padding: 40px; background: #111; width: 350px; text-align: center; z-index: 2; }
        
        /* NY MENY ANIMASJON & STRUKTUR */
        #modifiers-wrapper {
            width: 0px;
            overflow: hidden;
            transition: width 1.75s ease-out;
            position: relative;
        }
        #modifiers-wrapper.open {
            width: 450px;
        }
        #modifiers-panel { 
            width: 450px; background: #0f0f0f; border: 2px solid #333; border-left: none; 
            padding: 20px; display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr); gap: 15px; box-sizing: border-box; 
            height: 100%;
        }
        #expand-btn { 
            position: absolute; right: -50px; top: 50%; transform: translateY(-50%); 
            width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; 
            color: #fff; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 10px 10px 0; 
            z-index: 10;
        }

        .menu-label { display: block; text-align: left; margin-top: 15px; font-size: 11px; color: #555; text-transform: uppercase; font-weight: bold;}
        select, .start-btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 5px; cursor: pointer; font-family: inherit; }
        .start-btn { margin-top: 30px; background: #300; border-color: #600; font-weight: bold; letter-spacing: 2px; }
        .mod-slot { border: 1px dashed #222; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0a0a; color: #333; font-size: 20px; font-weight: bold; aspect-ratio: 1; text-align: center;}
        .mod-active { border: 1px solid #444; background: #111; color: #eee; font-size: 10px; justify-content: flex-start; padding: 5px; }
        .mod-img { background: #fff; width: 100%; aspect-ratio: 1.8; position: relative; margin-bottom: 5px; color: #000; font-weight: bold; text-align: center; line-height: 40px; font-size: 8px; }
        .mod-btns { display: flex; gap: 2px; width: 100%; }
        .mod-btns button { flex: 1; font-size: 9px; padding: 5px 0; background: #1a1a1a; color: #fff; border: 1px solid #333; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; }

        #jumpscare { 
            position: fixed; inset: 0; background: #600; color: #000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 1000; animation: shake 0.1s infinite;
        }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -5px); } 100% { transform: translate(5px, -5px); } }
    </style>
</head>
<body onload="init()">
    <div id="jumpscare">
        <h1 style="font-size: 80px; margin: 0;">FARGET</h1>
        <p style="font-size: 20px; font-weight: bold;">MINOTAUREN ER SULTEN...</p>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div class="main-box">
                <h1 style="color:#800; letter-spacing:8px; margin:0;">MINOTAUR</h1>
                <p style="color:#333; font-size:10px; margin-bottom:20px;">v.8.0 - LOS & UI UPDATE</p>
                <span class="menu-label">Maze Size</span>
                <select id="size"><option value="15">SMALL</option><option value="25" selected>MEDIUM</option><option value="40">LARGE</option></select>
                <span class="menu-label">Difficulty</span>
                <select id="diff"><option value="easy">EASY (0.8x)</option><option value="hard" selected>HARD (1.2x)</option><option value="insane">INSANE (1.5x)</option></select>
                <button class="start-btn" onclick="start()">START GAME</button>
            </div>
            
            <div id="modifiers-wrapper">
                <div id="modifiers-panel">
                    <div class="mod-slot mod-active"><div class="mod-img">CHAOS</div><div class="mod-btns"><button id="c1" onclick="setChaos(1)">1</button><button id="c2" onclick="setChaos(2)">2</button><button id="c3" onclick="setChaos(3)">3</button><button id="c4" onclick="setChaos(4)">4</button></div></div>
                    <div class="mod-slot mod-active"><div class="mod-img" style="background: #ffd700;">LIGHT</div><div class="mod-btns"><button id="b0" class="active" onclick="setBrightness(false)">OFF</button><button id="b1" onclick="setBrightness(true)">ON</button></div></div>
                    <div class="mod-slot mod-active"><div class="mod-img" style="background: #104; color:#fff;">ITEMS</div><div class="mod-btns"><button id="m0" class="active" onclick="setItemMadness(false)">OFF</button><button id="m1" onclick="setItemMadness(true)">MAD!</button></div></div>
                    <div class="mod-slot mod-active"><div class="mod-img" style="background: #444; color:#fff;">TRAPS</div><div class="mod-btns"><button id="t0" class="active" onclick="setTraps(0)">OFF</button><button id="t1" onclick="setTraps(1)">1</button><button id="t2" onclick="setTraps(2)">2</button></div></div>
                    <div class="mod-slot mod-active"><div class="mod-img" style="background: #800; color:#fff;">U-MINO</div><div class="mod-btns"><button id="u0" class="active" onclick="setUMino(false)">OFF</button><button id="u1" onclick="setUMino(true)">ON</button></div></div>
                    <div class="mod-slot">?</div>
                    <div class="mod-slot">?</div>
                    <div class="mod-slot">?</div>
                    <div class="mod-slot">?</div>
                </div>
            </div>
            <div id="expand-btn" onclick="togglePanel()">+</div>
        </div>
    </div>
    <canvas id="game"></canvas>

<script>
let chaos=0, fullBright=false, itemMadness=false, trapLevel=0, uMinoMode=false, isRunning=false, grid=[], items=[], trashCans=[], humans=[], monsters=[], traps=[];
let startTime = 0, lastItemSpawn = 0, visionBonus = 0, activeOranges = [];
let activeMinigame = null;
let player = { 
    gridX:1, gridY:1, renderX:0, renderY:0, isMoving:false, moveStart:0, 
    isHidden: false, lastSniff: 0, isSniffStunned: false, isSniffActive: false, 
    sniffStunTimer: 0, sniffActiveTimer: 0, sniffTarget: null, slowTimer: 0, noiseTarget: null
};
let difficultyMult=1.2, baseHumanSpeed=320, tileSize=40, mazeCenter={x:0,y:0};
const canvas=document.getElementById("game"), ctx=canvas.getContext("2d");

// NY TOGGLE LOGIKK
function togglePanel() { 
    const wrapper = document.getElementById('modifiers-wrapper');
    const btn = document.getElementById('expand-btn');
    if(wrapper.classList.contains('open')) {
        wrapper.classList.remove('open');
        btn.innerHTML = '+';
    } else {
        wrapper.classList.add('open');
        btn.innerHTML = '-';
    }
}

function setChaos(n) { chaos=(chaos===n)?0:n; [1,2,3,4].forEach(i=>document.getElementById('c'+i).className=(i===chaos?'active':'')); }
function setBrightness(v) { fullBright=v; document.getElementById('b0').className=!v?'active':''; document.getElementById('b1').className=v?'active':''; }
function setItemMadness(v) { itemMadness=v; document.getElementById('m0').className=!v?'active':''; document.getElementById('m1').className=v?'active':''; }
function setTraps(n) { trapLevel=n; [0,1,2].forEach(i=>document.getElementById('t'+i).className=(i===n?'active':'')); }
function setUMino(v) { uMinoMode=v; document.getElementById('u0').className=!v?'active':''; document.getElementById('u1').className=v?'active':''; }

// LINE OF SIGHT (LOS) FUNKSJON
function hasLOS(x1, y1, x2, y2) {
    if (x1 !== x2 && y1 !== y2) return false; // Ikke i samme gang (verken rad eller kolonne)
    
    if (x1 === x2) {
        let minY = Math.min(y1, y2), maxY = Math.max(y1, y2);
        for (let y = minY; y <= maxY; y++) {
            if (grid[y] && grid[y][x1] === 1) return false; // Vegg i veien!
        }
    } else {
        let minX = Math.min(x1, x2), maxX = Math.max(x1, x2);
        for (let x = minX; x <= maxX; x++) {
            if (grid[y1] && grid[y1][x] === 1) return false; // Vegg i veien!
        }
    }
    return true;
}

function getPath(sx, sy, tx, ty) {
    let q = [[{x:sx, y:sy}]], vis = new Set([sx + ',' + sy]);
    while(q.length > 0) {
        let path = q.shift(), cur = path[path.length-1];
        if(cur.x === tx && cur.y === ty) return path.slice(1);
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
            let nx=cur.x+dx, ny=cur.y+dy;
            if(grid[ny] && grid[ny][nx]===0 && !vis.has(nx+','+ny)) { vis.add(nx+','+ny); q.push([...path, {x:nx, y:ny}]); }
        });
    } return [];
}

function spawnItem(dim) {
    let x, y, tries = 0;
    do { x = Math.floor(Math.random()*dim); y = Math.floor(Math.random()*dim); tries++; } 
    while((grid[y][x]===1 || items.some(it=>it.gridX===x && it.gridY===y)) && tries < 100);
    if(tries < 100) items.push({gridX:x, gridY:y, type: Math.random() > 0.5 ? 'gold' : 'orange'});
}

function start() {
    let s=parseInt(document.getElementById("size").value), dim=s*2+1;
    grid=Array.from({length:dim},()=>Array(dim).fill(1)); mazeCenter={x:Math.floor(dim/2), y:Math.floor(dim/2)};
    let walls=[]; const addW=(x,y)=>{ [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy])=>{ let nx=x+dx*2, ny=y+dy*2; if(ny>0&&ny<dim-1&&nx>0&&nx<dim-1&&grid[ny][nx]===1) walls.push({x:nx,y:ny,wx:x+dx,wy:y+dy}); }); };
    grid[1][1]=0; addW(1,1);
    while(walls.length>0) { let i=Math.floor(Math.random()*walls.length); let {x,y,wx,wy}=walls.splice(i,1)[0]; if(grid[y][x]===1){ grid[wy][wx]=0; grid[y][x]=0; addW(x,y); } }
    for(let y=mazeCenter.y-1; y<=mazeCenter.y+1; y++) for(let x=mazeCenter.x-1; x<=mazeCenter.x+1; x++) grid[y][x]=0;
    
    startTime = performance.now();
    items=[]; visionBonus=0; activeOranges=[]; trashCans=[]; traps=[]; activeMinigame=null;
    
    let initialItems = itemMadness ? 50 : 15;
    for(let i=0; i<initialItems; i++) spawnItem(dim);
    
    for(let i=0; i<30; i++) {
        let tx, ty, tries=0;
        do { tx=Math.floor(Math.random()*dim); ty=Math.floor(Math.random()*dim); tries++; }
        while((grid[ty][tx]===1 || (tx===mazeCenter.x && ty===mazeCenter.y) || trashCans.some(tc=>tc.x===tx&&tc.y===ty)) && tries < 100);
        if(tries < 100) trashCans.push({x: tx, y: ty});
    }

    if(trapLevel > 0) {
        let trapMultiplier = (trapLevel === 1 ? 15 : 30);
        let trapCount = trapMultiplier * dim;
        for(let i=0; i<trapCount; i++) {
            let tx, ty, tries=0;
            do { tx=Math.floor(Math.random()*dim); ty=Math.floor(Math.random()*dim); tries++; }
            while((grid[ty][tx]===1 || (tx===mazeCenter.x && ty===mazeCenter.y) || trashCans.some(tc=>tc.x===tx&&tc.y===ty) || traps.some(t=>t.gridX===tx&&t.gridY===ty)) && tries < 100);
            if(tries < 100) {
                let r = Math.random() * 100;
                let type = 'glue'; 
                if(r < 2) type = 'lethal'; 
                else if(r < 50) type = 'glue'; 
                else type = 'noise'; 
                traps.push({gridX: tx, gridY: ty, type: type});
            }
        }
    }

    humans=[]; monsters=[];
    player.lastSniff = startTime + 30000 - 25000;
    
    if(uMinoMode) {
        player.gridX = mazeCenter.x; player.gridY = mazeCenter.y;
        for(let i=0; i<4; i++) {
            let hx, hy; do { hx=Math.floor(Math.random()*dim); hy=Math.floor(Math.random()*dim); } while(grid[hy][hx]===1 || Math.hypot(hx-mazeCenter.x, hy-mazeCenter.y) < 5);
            humans.push({gridX:hx, gridY:hy, renderX:hx*tileSize, renderY:hy*tileSize, isMoving:false, isDead:false, isHidden:false, path:[], slowTimer: 0});
        }
    } else {
        player.gridX=1; player.gridY=dim-2;
        for(let i=0; i<(1+chaos); i++) {
            monsters.push({
                gridX:mazeCenter.x, gridY:mazeCenter.y, renderX:mazeCenter.x*tileSize, renderY:mazeCenter.y*tileSize, 
                isMoving:false, isChasing:false, lastSniff: startTime + 30000 - 25000, 
                isSniffStunned: false, isSniffActive: false, sniffStunTimer: 0, sniffActiveTimer: 0, sniffTarget: null
            });
        }
    }
    player.renderX=player.gridX*tileSize; player.renderY=player.gridY*tileSize;
    document.getElementById("menu").style.display="none"; isRunning=true; lastItemSpawn=startTime; requestAnimationFrame(loop);
}

function update(now) {
    if(!isRunning) return;
    let gameTime = now - startTime;

    if(uMinoMode && window.keys['shift'] && gameTime > 30000 && now - player.lastSniff > 25000 && !player.isSniffStunned && !player.isSniffActive) {
        player.isSniffStunned = true; player.sniffStunTimer = now; player.lastSniff = now;
    }

    if(player.isSniffStunned) {
        if(now - player.sniffStunTimer > 2500) {
            player.isSniffStunned = false; player.isSniffActive = true; player.sniffActiveTimer = now;
            let valid = humans.filter(h => !h.isDead && !h.isHidden);
            if(valid.length > 0) {
                let targetH = valid[Math.floor(Math.random()*valid.length)];
                player.sniffTarget = {gridX: targetH.gridX, gridY: targetH.gridY, renderX: targetH.gridX*tileSize, renderY: targetH.gridY*tileSize};
            }
        }
    } else if(player.isSniffActive) {
        if(now - player.sniffActiveTimer > 8500) { player.isSniffActive = false; player.sniffTarget = null; }
    }

    // Minotaur AI (Classic mode)
    monsters.forEach(m => {
        let dist = Math.hypot(m.renderX - player.renderX, m.renderY - player.renderY);
        if(!uMinoMode && !player.isHidden && dist < 25) { isRunning = false; document.getElementById('jumpscare').style.display = 'flex'; setTimeout(() => location.reload(), 2000); return; }
        
        // OPPDATERT LOS LOGIKK: Chaser bare hvis de har fri sikt!
        let seePlayer = hasLOS(m.gridX, m.gridY, player.gridX, player.gridY) && !player.isHidden;
        if(!uMinoMode && seePlayer) { m.isChasing = true; } else { m.isChasing = false; }

        if(gameTime > 30000 && now - m.lastSniff > 25000 && !m.isSniffStunned && !m.isSniffActive && Math.random() < 0.01) {
            m.isSniffStunned = true; m.sniffStunTimer = now; m.lastSniff = now;
        }

        if(m.isSniffStunned) {
            if(now - m.sniffStunTimer > 2500) {
                m.isSniffStunned = false; m.isSniffActive = true; m.sniffActiveTimer = now;
                if(!player.isHidden) m.sniffTarget = {gridX: player.gridX, gridY: player.gridY};
            }
        } else if(m.isSniffActive) {
            if(now - m.sniffActiveTimer > 8500) { m.isSniffActive = false; m.sniffTarget = null; }
        }

        if(!m.isMoving && !m.isSniffStunned) {
            let nx, ny;
            if(m.sniffTarget) {
                let p = getPath(m.gridX, m.gridY, m.sniffTarget.gridX, m.sniffTarget.gridY);
                if(p.length > 0) { nx = p[0].x; ny = p[0].y; }
                if(m.gridX === m.sniffTarget.gridX && m.gridY === m.sniffTarget.gridY) m.sniffTarget = null;
            } else if(m.isChasing) {
                let p = getPath(m.gridX, m.gridY, player.gridX, player.gridY); 
                if(p.length > 0) { nx = p[0].x; ny = p[0].y; } 
            } else if(m.noiseTarget) {
                let p = getPath(m.gridX, m.gridY, m.noiseTarget.gridX, m.noiseTarget.gridY);
                if(p.length > 0) { nx = p[0].x; ny = p[0].y; }
                if(m.gridX === m.noiseTarget.gridX && m.gridY === m.noiseTarget.gridY) m.noiseTarget = null;
            } else {
                let ds=[[0,1],[0,-1],[1,0],[-1,0]].filter(d=>grid[m.gridY+d[1]]&&grid[m.gridY+d[1]][m.gridX+d[0]]===0); 
                let f=ds[Math.floor(Math.random()*ds.length)]; 
                if(f){nx=m.gridX+f[0]; ny=m.gridY+f[1];}
            }
            if(nx!==undefined){ m.isMoving=true; m.moveStart=now; m.targetX=nx; m.targetY=ny; }
        } else if(m.isMoving) {
            let speed = (baseHumanSpeed / difficultyMult);
            let t=Math.min((now-m.moveStart)/speed, 1);
            m.renderX=(m.gridX+(m.targetX-m.gridX)*t)*tileSize; m.renderY=(m.gridY+(m.targetY-m.gridY)*t)*tileSize;
            if(t===1){m.gridX=m.targetX; m.gridY=m.targetY; m.isMoving=false;}
        }
    });

    // OPPDATERT HUMAN AI (U-Mino)
    humans.forEach(h => {
        if(h.isDead) return;
        if(h.gridX === mazeCenter.x && h.gridY === mazeCenter.y) { isRunning=false; alert("A HUMAN ESCAPED! YOU LOSE."); location.reload(); }
        
        if(!h.isMoving) {
            let seeMino = hasLOS(h.gridX, h.gridY, player.gridX, player.gridY);
            let onTrash = trashCans.some(tc => tc.x === h.gridX && tc.y === h.gridY);

            // Gjemmer seg BARE hvis de ser deg og står på trash
            if(seeMino && onTrash) {
                h.isHidden = true; 
            } else {
                h.isHidden = false;
                if(seeMino) {
                    // RUN AWAY! (Motsatt vei av minotaur)
                    let dirs = [[0,1],[0,-1],[1,0],[-1,0]].filter(d => grid[h.gridY+d[1]] && grid[h.gridY+d[1]][h.gridX+d[0]] === 0);
                    dirs.sort((a,b) => Math.hypot(h.gridX+b[0]-player.gridX, h.gridY+b[1]-player.gridY) - Math.hypot(h.gridX+a[0]-player.gridX, h.gridY+a[1]-player.gridY));
                    if(dirs[0]) {
                        h.targetX = h.gridX + dirs[0][0]; h.targetY = h.gridY + dirs[0][1];
                        h.isMoving = true; h.moveStart = now; h.path = [];
                    }
                } else {
                    // Ser ikke minotaur -> Finn trashcan eller sentrum
                    let nearbyTrash = trashCans.find(tc => Math.hypot(tc.x - h.gridX, tc.y - h.gridY) < 5);
                    if (nearbyTrash) {
                        h.path = getPath(h.gridX, h.gridY, nearbyTrash.x, nearbyTrash.y);
                        let next = h.path.shift();
                        if(next) { h.targetX = next.x; h.targetY = next.y; h.isMoving = true; h.moveStart = now; }
                    } else {
                        if(h.path.length === 0) h.path = getPath(h.gridX, h.gridY, mazeCenter.x, mazeCenter.y);
                        let next = h.path.shift();
                        if(next) { 
                            h.targetX = next.x; h.targetY = next.y; h.isMoving = true; h.moveStart = now; 
                        } else {
                            let ds = [[0,1],[0,-1],[1,0],[-1,0]].filter(d => grid[h.gridY+d[1]] && grid[h.gridY+d[1]][h.gridX+d[0]] === 0);
                            if(ds.length > 0) {
                                let f = ds[Math.floor(Math.random()*ds.length)];
                                h.targetX = h.gridX + f[0]; h.targetY = h.gridY + f[1];
                                h.isMoving = true; h.moveStart = now;
                            }
                        }
                    }
                }
            }
        } else {
            let speed = baseHumanSpeed / (difficultyMult * 1.1);
            if(h.slowTimer > now) speed /= 2;
            let t=Math.min((now-h.moveStart)/speed, 1);
            h.renderX=(h.gridX+(h.targetX-h.gridX)*t)*tileSize; h.renderY=(h.gridY+(h.targetY-h.gridY)*t)*tileSize;
            if(t===1){ h.gridX=h.targetX; h.gridY=h.targetY; h.isMoving=false; handleTrap(h, false); }
        }
        if(!h.isHidden && Math.hypot(h.renderX - player.renderX, h.renderY - player.renderY) < 20) h.isDead = true;
    });

    function handleTrap(entity, isPlayer) {
        let tidx = traps.findIndex(t => t.gridX === entity.gridX && t.gridY === entity.gridY);
        if(tidx !== -1) {
            let trap = traps[tidx];
            if(trap.type === 'lethal') {
                if(isPlayer && !uMinoMode) { isRunning = false; document.getElementById('jumpscare').style.display='flex'; }
                else if(!isPlayer) entity.isDead = true;
            } else if(trap.type === 'glue') {
                entity.slowTimer = now + 5000;
            } else if(trap.type === 'noise') {
                if(isPlayer && !uMinoMode) monsters.forEach(m => m.noiseTarget = {gridX: trap.gridX, gridY: trap.gridY});
                else if(!isPlayer && uMinoMode) player.noiseTarget = {gridX: trap.gridX, gridY: trap.gridY, timer: now + 5000};
            }
            traps.splice(tidx, 1);
        }
    }

    if(!player.isMoving && !player.isSniffStunned && !activeMinigame) {
        let dx=0, dy=0; if(window.keys?.w) dy=-1; else if(window.keys?.s) dy=1; else if(window.keys?.a) dx=-1; else if(window.keys?.d) dx=1;
        if(dx||dy){ 
            let nx=player.gridX+dx, ny=player.gridY+dy; 
            if(grid[ny]&&grid[ny][nx]===0){player.isMoving=true; player.moveStart=now; player.targetX=nx; player.targetY=ny;} 
        }
    } else if(player.isMoving) {
        let speed = (uMinoMode ? baseHumanSpeed*0.7 : baseHumanSpeed);
        if(player.slowTimer > now) speed *= 2;
        let t=Math.min((now-player.moveStart)/speed, 1);
        player.renderX=(player.gridX+(player.targetX-player.gridX)*t)*tileSize; player.renderY=(player.gridY+(player.targetY-player.gridY)*t)*tileSize;
        if(t===1){ player.gridX=player.targetX; player.gridY=player.targetY; player.isMoving=false; handleTrap(player, true); }
    }
}

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const ox=canvas.width/2-player.renderX-20, oy=canvas.height/2-player.renderY-20;
    ctx.fillStyle="#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    ctx.fillStyle="#B3B3B3";
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) if(grid[y][x]===1) ctx.fillRect(x*tileSize+ox, y*tileSize+oy, tileSize, tileSize);
    
    trashCans.forEach(tc => {
        ctx.fillStyle = "#222"; ctx.fillRect(tc.x*tileSize+ox+5, tc.y*tileSize+oy+5, tileSize-10, tileSize-10);
        ctx.fillStyle = "#111"; ctx.fillRect(tc.x*tileSize+ox+10, tc.y*tileSize+oy+10, tileSize-20, tileSize-20);
    });

    traps.forEach(t => {
        if(t.type === 'glue') ctx.fillStyle = "rgba(100, 100, 100, 0.6)"; 
        else if(t.type === 'noise') ctx.fillStyle = "rgba(200, 200, 50, 0.6)"; 
        else if(t.type === 'lethal') ctx.fillStyle = "#8b4513"; 
        ctx.fillRect(t.gridX*tileSize+ox+5, t.gridY*tileSize+oy+5, tileSize-10, tileSize-10);
    });

    items.forEach(it => { ctx.fillStyle = it.type === 'gold' ? "#ffd700" : "#ff8c00"; ctx.beginPath(); ctx.arc(it.gridX*tileSize+ox+20, it.gridY*tileSize+oy+20, 8, 0, Math.PI*2); ctx.fill(); });
    
    ctx.fillStyle = "#8b4513"; ctx.fillRect(mazeCenter.x*tileSize+ox+12, mazeCenter.y*tileSize+oy+12, 16, 16);

    monsters.forEach(m => {
        ctx.fillStyle = m.isSniffStunned ? "#500" : "#800";
        ctx.beginPath(); ctx.arc(m.renderX+ox+20, m.renderY+oy+20, 16, 0, Math.PI*2); ctx.fill();
    });
    
    humans.forEach(h => {
        if(!h.isDead && !h.isHidden) { ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(h.renderX+ox+20, h.renderY+oy+20, 11, 0, Math.PI*2); ctx.fill(); }
    });

    if(!uMinoMode && player.isHidden) {
        ctx.fillStyle = "rgba(255, 255, 255, 0.2)";
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 11, 0, Math.PI*2); ctx.fill();
    } else {
        ctx.fillStyle = uMinoMode ? (player.isSniffStunned ? "#500" : "#f00") : "#fff";
        ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, uMinoMode ? 16 : 11, 0, Math.PI*2); ctx.fill();
    }

    let anySniffing = (uMinoMode && player.isSniffStunned) || monsters.some(m => m.isSniffStunned);
    if(anySniffing) {
        ctx.fillStyle = "red"; ctx.font = "bold 30px Courier New"; ctx.textAlign = "center";
        ctx.fillText("THE MINOTAUR IS SNIFFING AROUND... HIDE!", canvas.width/2, 60);
    }

    if(uMinoMode && player.sniffTarget && player.isSniffActive) {
        ctx.strokeStyle = "rgba(255, 0, 0, 0.5)"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(canvas.width/2, canvas.height/2);
        ctx.lineTo(player.sniffTarget.renderX+ox+20, player.sniffTarget.renderY+oy+20); ctx.stroke();
    }

    if(!fullBright) {
        let t=document.createElement('canvas'); t.width=canvas.width; t.height=canvas.height; let tc=t.getContext('2d');
        tc.fillStyle="black"; tc.fillRect(0,0,t.width,t.height); tc.globalCompositeOperation="destination-out";
        let vRad = (uMinoMode ? 450 : 180) + visionBonus;
        let g=tc.createRadialGradient(t.width/2,t.height/2,0,t.width/2,t.height/2,vRad);
        g.addColorStop(0,"white"); g.addColorStop(1,"transparent"); tc.fillStyle=g; tc.beginPath(); tc.arc(t.width/2,t.height/2,vRad,0,Math.PI*2); tc.fill();
        activeOranges.forEach(o => {
            let lx = o.x*tileSize+ox+20, ly = o.y*tileSize+oy+20;
            let og=tc.createRadialGradient(lx, ly, 0, lx, ly, 100); og.addColorStop(0,"rgba(255,140,0,1)"); og.addColorStop(1,"transparent");
            tc.fillStyle=og; tc.beginPath(); tc.arc(lx, ly, 100, 0, Math.PI*2); tc.fill();
        });
        ctx.drawImage(t,0,0);
    }

    requestAnimationFrame(loop);
}

window.keys = {};
window.onkeydown=e=>{ window.keys[e.key.toLowerCase()]=true; if(e.key==='e') interact(); };
window.onkeyup=e=>{ window.keys[e.key.toLowerCase()]=false; };

function interact() {
    if(!uMinoMode && player.gridX === mazeCenter.x && player.gridY === mazeCenter.y) { alert("YOU ESCAPED!"); location.reload(); return; }
    
    let onTrash = trashCans.some(tc => tc.x === player.gridX && tc.y === player.gridY);
    if(!uMinoMode && onTrash) player.isHidden = !player.isHidden;
    
    let idx = items.findIndex(it => it.gridX === player.gridX && it.gridY === player.gridY);
    if(idx !== -1) {
        if(items[idx].type === 'gold') visionBonus += 30;
        else activeOranges.push({x: items[idx].gridX, y: items[idx].gridY});
        items.splice(idx, 1);
    }
}

function init(){}
</script>
