<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: Shadow & Stealth</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', Courier, monospace; overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #menu-wrapper { display: flex; position: relative; transition: all 0.3s ease; align-items: stretch; }
        .box { border: 2px solid #333; padding: 40px; background: #111; width: 400px; text-align: center; position: relative; z-index: 2; }
        #modifiers-panel { display: none; width: 420px; background: #111; border: 2px solid #333; border-left: none; padding: 20px; grid-template-columns: repeat(3, 1fr); gap: 10px; align-content: start; box-sizing: border-box; }
        #expand-btn { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; color: #fff; font-size: 30px; cursor: pointer; border-radius: 0 10px 10px 0; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .mod-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .mod-img { background: #fff; width: 100%; aspect-ratio: 1.8 / 1; position: relative; border: 1px solid #444; }
        .mod-title { position: absolute; bottom: 2px; width: 100%; text-align: center; color: #000; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .mod-desc { font-size: 10px; color: #aaa; margin: 6px 0; min-height: 24px; }
        .mod-btns { display: flex; gap: 4px; width: 100%; }
        .mod-btns button { padding: 4px; font-size: 12px; flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; font-weight: bold; }
        .mod-card.blank { opacity: 0.2; }
        h1 { letter-spacing: 10px; color: #800; text-shadow: 0 0 10px #f00; margin: 0; }
        #sniff-alert { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); color: #ff0000; font-size: 24px; font-weight: bold; display: none; z-index: 200; text-align: center; text-shadow: 0 0 10px #f00; }
        #jumpscare { position: absolute; inset: 0; background: #000; display: none; z-index: 1000; justify-content: center; align-items: center; }
        .scare-face { width: 100%; height: 100%; background: radial-gradient(circle, #f00 0%, #000 70%); display: flex; justify-content: center; align-items: center; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(5px, 5px); } 50% { transform: translate(-5px, -10px); } 100% { transform: translate(5px, 5px); } }
        #victory-screen { display: none; background: rgba(0, 50, 0, 0.9); }
    </style>
</head>
<body onload="initMenu()">

    <div id="sniff-alert">BRÅK! Minotauren hørte deg!</div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div class="box">
                <h1>MINOTAUR</h1>
                <p id="menu-tip">Laster tips...</p>
                <select id="size">
                    <option value="15">LITEN</option>
                    <option value="25" selected>STOR</option>
                    <option value="45">DIGERT</option>
                </select>
                <select id="diff">
                    <option value="easy">ENKEL</option>
                    <option value="medium" selected>MEDIUM</option>
                    <option value="hard">VANSKELIG</option>
                </select>
                <button style="width:100%; padding:12px; background:#1a1a1a; color:#fff; border:1px solid #333; margin-top:10px; cursor:pointer;" onclick="start()">START FLUKTEN</button>
            </div>
            
            <div id="modifiers-panel">
                <div class="mod-card">
                    <div class="mod-img"><div class="mod-title">minotaur chaos</div></div>
                    <p class="mod-desc">Flere monstre.<br>De sprer seg ut.</p>
                    <div class="mod-btns">
                        <button id="btn-chaos-1" onclick="toggleChaos(1)">1</button>
                        <button id="btn-chaos-2" onclick="toggleChaos(2)">2</button>
                        <button id="btn-chaos-3" onclick="toggleChaos(3)">3</button>
                        <button id="btn-chaos-4" onclick="toggleChaos(4)">4</button>
                    </div>
                </div>
                <script>for(let i=0; i<8; i++) document.write('<div class="mod-card blank"><div class="mod-img"><div class="mod-title">???</div></div><p class="mod-desc">Låst</p></div>');</script>
            </div>
            <div id="expand-btn" onclick="togglePanel()">+</div>
        </div>
    </div>

    <div id="jumpscare"><div class="scare-face"><h1 style="font-size: 80px; color: #fff;">FANGET!</h1></div></div>
    <div id="victory-screen" class="overlay"><div class="box" style="border-color: #0f0;"><h1 style="color: #0f0;">FRIHET</h1><button onclick="location.reload()">SPILL IGJEN</button></div></div>
    <canvas id="game"></canvas>

<script>
let chaosLevel = 0;
function togglePanel() {
    const p = document.getElementById('modifiers-panel');
    const b = document.getElementById('expand-btn');
    const open = p.style.display === 'grid';
    p.style.display = open ? 'none' : 'grid';
    b.innerText = open ? '+' : '-';
}
function toggleChaos(lvl) {
    chaosLevel = (chaosLevel === lvl) ? 0 : lvl;
    for(let i=1; i<=4; i++) document.getElementById('btn-chaos-'+i).className = (i === chaosLevel) ? 'active' : '';
}
function initMenu() {
    const tips = ["Løp rundt hjørner for å miste forfølgere!", "Vinner du i boksen, rømmer minotauren.", "Gul belysning hjelper deg å se mer."];
    document.getElementById("menu-tip").innerText = tips[Math.floor(Math.random() * tips.length)];
}

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const tileSize = 40;
const moveTime = 350;

let grid = [], items = [], placedLights = [], hideSpots = [], exit = {x:0, y:0};
let isRunning = false, lastTime = 0, monsters = [];
let player = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, visionRadius: 180, isHiding: false };
let minigame = { active: false, progress: 50, targetKey: 'w' };

const diffSettings = {
    easy: { mSpeed: 0.8, soundChance: 0 },
    medium: { mSpeed: 1.1, soundChance: 1 },
    hard: { mSpeed: 1.5, soundChance: 3 }
};

function start() {
    const s = parseInt(document.getElementById("size").value);
    const dConf = diffSettings[document.getElementById("diff").value];
    generateMaze(s);
    player.gridX = 1; player.gridY = grid.length - 2;
    player.renderX = player.gridX * tileSize; player.renderY = player.gridY * tileSize;

    monsters = [];
    let n = 1 + chaosLevel;
    for(let i=0; i<n; i++) {
        let mx = Math.floor(grid[0].length / 2), my = Math.floor(grid.length / 2);
        if(grid[my][mx] === 1) mx++;
        monsters.push({
            gridX: mx, gridY: my, renderX: mx*tileSize, renderY: my*tileSize, targetX: mx, targetY: my,
            isMoving: false, moveStart: 0, waitEnd: 0, baseSpeedMult: dConf.mSpeed,
            lastSeenX: -1, lastSeenY: -1, isAggro: false, blindMode: chaosLevel >= 2, retreating: false
        });
    }
    spawnExtras(s);
    document.getElementById("menu").style.display = "none";
    isRunning = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function generateMaze(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    function walk(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < dim-1 && nx > 0 && nx < dim-1 && grid[ny][nx] === 1) { grid[y + dy/2][x + dx/2] = 0; walk(nx, ny); }
        }
    }
    walk(1, 1); exit = { x: dim - 2, y: 1 };
}

function spawnExtras(s) {
    items = []; hideSpots = [];
    let count = s === 15 ? 20 : (s === 25 ? 40 : 60);
    for(let i=0; i<count; i++) {
        let x, y; do { x = Math.floor(Math.random()*grid.length); y = Math.floor(Math.random()*grid.length); } while(grid[y][x] === 1);
        if(i < count/3) hideSpots.push({x, y});
        else items.push({x, y, type: Math.random() > 0.3 ? 'orange' : 'yellow'});
    }
}

function hasLineOfSight(m) {
    if (player.isHiding) return false;
    if (m.gridX !== player.gridX && m.gridY !== player.gridY) return false;
    let dx = Math.sign(player.gridX - m.gridX), dy = Math.sign(player.gridY - m.gridY);
    let curX = m.gridX + dx, curY = m.gridY + dy;
    while (curX !== player.gridX || curY !== player.gridY) {
        if (grid[curY][curX] === 1) return false;
        curX += dx; curY += dy;
    }
    return true;
}

function triggerSoundTrap() {
    const dConf = diffSettings[document.getElementById("diff").value];
    if (Math.random() * 100 > dConf.soundChance) return;
    monsters.forEach(m => { m.lastSeenX = player.gridX; m.lastSeenY = player.gridY; });
    const b = document.getElementById("sniff-alert"); b.style.display = "block";
    setTimeout(() => { b.style.display = "none"; }, 1500);
}

function update(now) {
    if (!isRunning) return;
    let dt = (now - lastTime) / 1000; lastTime = now;

    if (minigame.active) {
        minigame.progress -= 25 * dt;
        if (minigame.progress <= 0) gameOver();
        else if (minigame.progress >= 100) { 
            minigame.active=false; player.isHiding=false; 
            monsters.forEach(m=>{m.retreating=true; m.retreatEnd=now+2000; m.isAggro=false; m.lastSeenX=-1;});
        }
    } else {
        monsters.forEach(m => {
            if (hasLineOfSight(m)) {
                m.isAggro = true; m.lastSeenX = player.gridX; m.lastSeenY = player.gridY;
            }

            if(!m.isMoving && now > m.waitEnd) {
                let tx, ty;
                if(m.isAggro || m.lastSeenX !== -1) {
                    tx = m.lastSeenX; ty = m.lastSeenY;
                    if(m.gridX === tx && m.gridY === ty) { m.isAggro = false; m.lastSeenX = -1; return; }
                } else if(m.blindMode) {
                    do { tx=Math.floor(Math.random()*(grid[0].length-2))+1; ty=Math.floor(Math.random()*(grid.length-2))+1; } while(grid[ty][tx]===1);
                } else {
                    tx=Math.max(1,Math.min(grid[0].length-2, player.gridX+Math.floor((Math.random()-0.5)*10)));
                    ty=Math.max(1,Math.min(grid.length-2, player.gridY+Math.floor((Math.random()-0.5)*10)));
                }

                let q=[{x:m.gridX,y:m.gridY,p:[]}], v=new Set([m.gridX+','+m.gridY]), next=null;
                while(q.length>0){ 
                    let c=q.shift(); if(c.x===tx&&c.y===ty){next=c.p[0];break;} 
                    [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx,dy])=>{
                        let nx=c.x+dx,ny=c.y+dy; if(grid[ny]&&grid[ny][nx]===0&&!v.has(nx+','+ny)){v.add(nx+','+ny); q.push({x:nx,y:ny,p:[...c.p,{x:nx,y:ny}]});}
                    }); 
                }
                if(next){ m.isMoving=true; m.moveStart=now; m.targetX=next.x; m.targetY=next.y; } else m.waitEnd=now+200;
            }

            if(m.isMoving){ 
                let speed = m.isAggro ? 1.5 : 1.0;
                let s = moveTime / (m.baseSpeedMult * speed);
                let t = Math.min((now-m.moveStart)/s,1); 
                m.renderX=(m.gridX+(m.targetX-m.gridX)*t)*tileSize; m.renderY=(m.gridY+(m.targetY-m.gridY)*t)*tileSize; 
                if(t===1){ m.isMoving=false; m.gridX=m.targetX; m.gridY=m.targetY; } 
            }
        });

        if(!player.isHiding){
            if(!player.isMoving){
                let dx=0, dy=0; if(keys['w'])dy=-1; else if(keys['s'])dy=1; else if(keys['a'])dx=-1; else if(keys['d'])dx=1;
                if(dx!==0||dy!==0){ let nx=player.gridX+dx,ny=player.gridY+dy; if(grid[ny]&&grid[ny][nx]===0){player.isMoving=true; player.moveStart=now; player.targetX=nx; player.targetY=ny;} }
            } else {
                let t=Math.min((now-player.moveStart)/moveTime,1); player.renderX=(player.gridX+(player.targetX-player.gridX)*t)*tileSize; player.renderY=(player.gridY+(player.targetY-player.gridY)*t)*tileSize;
                if(t===1){ player.isMoving=false; player.gridX=player.targetX; player.gridY=player.targetY; triggerSoundTrap(); }
            }
        }
    }
    if(!player.isHiding && monsters.some(m=>Math.abs(player.renderX-m.renderX)<25 && Math.abs(player.renderY-m.renderY)<25)) gameOver();
    if(player.gridX===exit.x && player.gridY===exit.y){ isRunning=false; document.getElementById("victory-screen").style.display="flex"; }
}

function gameOver(){ isRunning=false; document.getElementById("jumpscare").style.display="flex"; setTimeout(()=>location.reload(), 2000); }

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width=window.innerWidth; canvas.height=window.innerHeight;
    const ox=canvas.width/2-player.renderX-20, oy=canvas.height/2-player.renderY-20;
    ctx.fillStyle="#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) if(grid[y][x]===1){ ctx.fillStyle="#1a1a1a"; ctx.fillRect(x*tileSize+ox,y*tileSize+oy,tileSize,tileSize); }
    hideSpots.forEach(s=>{ ctx.fillStyle="rgba(0,100,0,0.3)"; ctx.fillRect(s.x*tileSize+ox+5,s.y*tileSize+oy+5,tileSize-10,tileSize-10); });
    items.forEach(it=>{ ctx.fillStyle=it.type==='orange'?"#ffa500":"#ffff00"; ctx.beginPath(); ctx.arc(it.x*tileSize+ox+20,it.y*tileSize+oy+20,8,0,Math.PI*2); ctx.fill(); });
    ctx.fillStyle="#0f0"; ctx.fillRect(exit.x*tileSize+ox+10,exit.y*tileSize+oy+10,20,20);
    
    monsters.forEach(m=>{ 
        ctx.fillStyle = m.isAggro ? "#ff4d4d" : "#660000"; // Lysere rød når aggro
        ctx.beginPath(); ctx.arc(m.renderX+ox+20,m.renderY+oy+20,14,0,Math.PI*2); ctx.fill();
    });

    if(!player.isHiding){ ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(canvas.width/2,canvas.height/2,10,0,Math.PI*2); ctx.fill(); }
    
    let t=document.createElement('canvas'); t.width=canvas.width; t.height=canvas.height; let tc=t.getContext('2d');
    tc.fillStyle="rgba(0,0,0,0.97)"; tc.fillRect(0,0,t.width,t.height); tc.globalCompositeOperation="destination-out";
    let pg=tc.createRadialGradient(t.width/2,t.height/2,10,t.width/2,t.height/2,player.visionRadius); pg.addColorStop(0,"white"); pg.addColorStop(1,"transparent"); tc.fillStyle=pg; tc.beginPath(); tc.arc(t.width/2,t.height/2,player.visionRadius,0,Math.PI*2); tc.fill();
    placedLights.forEach(l=>{ let lx=l.x*tileSize+ox+20,ly=l.y*tileSize+oy+20; let lg=tc.createRadialGradient(lx,ly,10,lx,ly,160); lg.addColorStop(0,"white"); lg.addColorStop(1,"transparent"); tc.fillStyle=lg; tc.beginPath(); tc.arc(lx,ly,160,0,Math.PI*2); tc.fill(); });
    ctx.drawImage(t,0,0);

    if(minigame.active){ 
        ctx.fillStyle="#fff"; ctx.font="20px Courier"; ctx.textAlign="center"; 
        ctx.fillText("HAMRE ["+minigame.targetKey.toUpperCase()+"]!", canvas.width/2, canvas.height/2+100);
    }
    requestAnimationFrame(loop);
}

const keys={};
window.onkeydown=e=>{ 
    let k=e.key.toLowerCase(); keys[k]=true; 
    if(minigame.active && ['w','a','s','d'].includes(k)){ 
        if(k===minigame.targetKey){ minigame.progress+=15; minigame.targetKey=['w','a','s','d'][Math.floor(Math.random()*4)]; } 
    } 
    if(k==='e'){ 
        let i=items.findIndex(it=>it.x===player.gridX&&it.y===player.gridY); 
        if(i!==-1){ if(items[i].type==='orange')placedLights.push({x:player.gridX,y:player.gridY}); else player.visionRadius+=60; items.splice(i,1); return; } 
        if(hideSpots.some(h=>h.x===player.gridX&&h.y===player.gridY) && !player.isHiding){ 
            player.isHiding=true; 
            if(monsters.some(m=>m.isAggro||Math.abs(m.gridX-player.gridX)<5)) { minigame.active=true; minigame.progress=50; }
        }
    }
};
window.onkeyup=e=>keys[e.key.toLowerCase()]=false;
</script>
</body>
</html>
