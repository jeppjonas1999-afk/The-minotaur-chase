<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Vault - v.3.1 Light & Vision Update</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; }
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; justify-content: center; align-items: center; z-index: 100; }
        #menu-wrapper { display: flex; position: relative; align-items: stretch; }
        .main-box { border: 2px solid #333; padding: 40px; background: #111; width: 350px; text-align: center; z-index: 2; }
        #modifiers-panel { 
            display: none; width: 450px; background: #0f0f0f; border: 2px solid #333; 
            border-left: none; padding: 20px; grid-template-columns: repeat(3, 1fr); gap: 15px; 
        }
        #expand-btn { 
            position: absolute; right: -50px; top: 50%; transform: translateY(-50%); 
            width: 50px; height: 100px; background: #222; border: 2px solid #333; 
            color: #fff; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 10px 10px 0; 
        }
        .menu-label { display: block; text-align: left; margin-top: 15px; font-size: 11px; color: #555; text-transform: uppercase; }
        select, .start-btn { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 5px; cursor: pointer; font-family: inherit; }
        .start-btn { margin-top: 30px; background: #300; border-color: #600; font-weight: bold; letter-spacing: 2px; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; font-size: 18px; color: #ffd700; text-shadow: 2px 2px #000; display: none; }
        #hunt-warning { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: #f00; font-size: 24px; font-weight: bold; display: none; z-index: 200; }
        #mg-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 300px; display: none; z-index: 1001; text-align: center; }
        #mg-bar-bg { width: 100%; height: 25px; background: #000; border: 3px solid #fff; overflow: hidden; }
        #mg-bar-fill { height: 100%; width: 50%; background: #0f0; }
        #jumpscare { position: fixed; inset: 0; background: #900; z-index: 5000; display: none; justify-content: center; align-items: center; }
        #jumpscare img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body onload="init()">

    <div id="ui-layer">ITEMS: <span id="item-count">0</span> | VISION: +<span id="vision-lvl">0</span></div>
    <div id="jumpscare"><img src="https://i.imgur.com/vHqY7bE.png" id="js-img"></div>
    <div id="hunt-warning">THE MINOTAUR IS SNIFFING AROUND... HIDE!</div>
    
    <div id="mg-container">
        <div id="mg-bar-bg"><div id="mg-bar-fill"></div></div>
        <div id="mg-text" style="margin-top:10px;">HAMRE TASTER!</div>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div class="main-box">
                <h1 style="color:#800; letter-spacing:8px; margin:0;">MINOTAUR</h1>
                <p style="color:#333; font-size:10px; margin-bottom:20px;">v.3.1 LIGHT & VISION</p>
                <span class="menu-label">Map Size</span>
                <select id="size"><option value="15">SMALL</option><option value="25" selected>MEDIUM</option><option value="40">LARGE</option></select>
                <span class="menu-label">Difficulty</span>
                <select id="diff"><option value="easy">EASY</option><option value="hard" selected>HARD</option><option value="insane">INSANE</option></select>
                <button class="start-btn" onclick="start()">START GAME</button>
            </div>
            <div id="expand-btn" onclick="togglePanel()">+</div>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
let chaos = 0, fullBright = false, isRunning = false, lastTime = 0, grid = [], hideSpots = [], monsters = [], items = [], keys = {};
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const tileSize = 40, baseMoveTime = 320;

let player = { 
    gridX: 1, gridY: 1, renderX: 0, renderY: 0, 
    isMoving: false, isHiding: false, moveStart: 0, 
    hideStartTime: 0, itemsFound: 0, 
    visionBonus: 0, lampActive: false 
};
let minigame = { active: false, progress: 50, targetKey: 'w', monsterRef: null };
let mazeCenter = { x: 0, y: 0 };

function init() {}
function togglePanel() { const p = document.getElementById('modifiers-panel'); p.style.display = (p.style.display === 'grid') ? 'none' : 'grid'; }

function triggerJumpscare() {
    isRunning = false;
    document.getElementById("jumpscare").style.display = "flex";
    let blink = false;
    let shakeInt = setInterval(() => { 
        document.getElementById("js-img").style.transform = `translate(${(Math.random()-0.5)*100}px, ${(Math.random()-0.5)*100}px) scale(1.2)`; 
        document.getElementById("jumpscare").style.background = (blink = !blink) ? "#f00" : "#000";
    }, 30);
    setTimeout(() => { clearInterval(shakeInt); location.reload(); }, 1500);
}

function generate(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    mazeCenter = { x: Math.floor(dim/2), y: Math.floor(dim/2) };
    for(let y=mazeCenter.y-1; y<=mazeCenter.y+1; y++) for(let x=mazeCenter.x-1; x<=mazeCenter.x+1; x++) grid[y][x] = 0;
    grid[mazeCenter.y-2][mazeCenter.x]=0; grid[mazeCenter.y+2][mazeCenter.x]=0;
    grid[mazeCenter.y][mazeCenter.x-2]=0; grid[mazeCenter.y][mazeCenter.x+2]=0;
    let walls = [];
    const addW = (x,y) => {
        [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
            let nx=x+dx*2, ny=y+dy*2;
            if(ny>0 && ny<dim-1 && nx>0 && nx<dim-1 && grid[ny][nx]===1) walls.push({x:nx, y:ny, wx:x+dx, wy:y+dy});
        });
    };
    grid[1][1]=0; addW(1,1);
    while(walls.length > 0) {
        let i = Math.floor(Math.random()*walls.length);
        let {x,y,wx,wy} = walls.splice(i,1)[0];
        if(grid[y][x]===1) { grid[wy][wx]=0; grid[y][x]=0; addW(x,y); }
    }
}

function start() {
    let s = parseInt(document.getElementById("size").value);
    generate(s);
    player.gridX = 1; player.gridY = grid.length-2;
    player.renderX = player.gridX*tileSize; player.renderY = player.gridY*tileSize;
    player.itemsFound = 0; player.visionBonus = 0;
    
    hideSpots = []; items = [];
    let itemCount = s === 15 ? 20 : (s === 25 ? 40 : 60);

    for(let i=0; i<s*2; i++) {
        let x,y; do { x=Math.floor(Math.random()*grid.length); y=Math.floor(Math.random()*grid.length); } 
        while(grid[y][x]===1 || (Math.abs(x-mazeCenter.x)<2 && Math.abs(y-mazeCenter.y)<2));
        hideSpots.push({x,y});
    }

    for(let i=0; i<itemCount; i++) {
        let x,y; do { x=Math.floor(Math.random()*grid.length); y=Math.floor(Math.random()*grid.length); } 
        while(grid[y][x]===1 || (x===player.gridX && y===player.gridY));
        let type = Math.random() < 0.75 ? 'orange' : 'yellow';
        items.push({x, y, type});
    }

    monsters = [{
        gridX: mazeCenter.x, gridY: mazeCenter.y, renderX: mazeCenter.x*tileSize, renderY: mazeCenter.y*tileSize,
        isMoving: false, isHunting: false, path: [], nextAbilityTime: performance.now() + 10000, lastDir: {dx:0, dy:0}
    }];
    
    document.getElementById("menu").style.display = "none";
    document.getElementById("ui-layer").style.display = "block";
    isRunning = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function update(now) {
    if(!isRunning) return;
    let dt = (now - lastTime)/1000; lastTime = now;

    // Item Opplukking
    items = items.filter(it => {
        if(it.x === player.gridX && it.y === player.gridY) {
            player.itemsFound++;
            if(it.type === 'yellow') {
                player.visionBonus += 1;
                document.getElementById("vision-lvl").innerText = player.visionBonus;
            } else {
                player.lampActive = true; // Lampen tennes automatisk ved opplukking her
            }
            document.getElementById("item-count").innerText = player.itemsFound;
            return false;
        }
        return true;
    });

    // 3-sekunders utkast (hvis ikke QTE er aktiv)
    if(player.isHiding && !minigame.active) {
        if(now - player.hideStartTime > 3000) player.isHiding = false;
    }

    // Enkel AI (Roaming/Jakt)
    monsters.forEach(m => {
        if(!m.isMoving) {
            let nx, ny;
            if(m.isHunting && m.path.length > 0) {
                let step = m.path.shift(); nx = step.x; ny = step.y;
            } else {
                let dirs = [[0,1],[0,-1],[1,0],[-1,0]].filter(d => grid[m.gridY+d[1]] && grid[m.gridY+d[1]][m.gridX+d[0]] === 0);
                let finalDir = dirs[Math.floor(Math.random()*dirs.length)];
                if(finalDir) { nx = m.gridX + finalDir[0]; ny = m.gridY + finalDir[1]; }
            }
            if(nx!==undefined) { m.isMoving = true; m.moveStart = now; m.targetX = nx; m.targetY = ny; }
        } else {
            let speed = m.isHunting ? 120 : 320;
            let t = Math.min((now - m.moveStart)/speed, 1);
            m.renderX = (m.gridX + (m.targetX-m.gridX)*t)*tileSize; m.renderY = (m.gridY + (m.targetY-m.gridY)*t)*tileSize;
            if(t===1) { m.gridX = m.targetX; m.gridY = m.targetY; m.isMoving = false; }
        }
    });

    // Spiller Bevegelse
    if(!player.isHiding && !player.isMoving) {
        let dx=0, dy=0; if(keys['w']) dy=-1; else if(keys['s']) dy=1; else if(keys['a']) dx=-1; else if(keys['d']) dx=1;
        if(dx!==0 || dy!==0) {
            let nx = player.gridX+dx, ny = player.gridY+dy;
            if(grid[ny] && grid[ny][nx]===0) { player.isMoving = true; player.moveStart = now; player.targetX = nx; player.targetY = ny; }
        }
    } else if(player.isMoving) {
        let t = Math.min((now - player.moveStart)/baseMoveTime, 1);
        player.renderX = (player.gridX + (player.targetX-player.gridX)*t)*tileSize;
        player.renderY = (player.gridY + (player.targetY-player.gridY)*t)*tileSize;
        if(t===1) { player.gridX = player.targetX; player.gridY = player.targetY; player.isMoving = false; }
    }

    if(!player.isHiding && monsters.some(m => Math.hypot(m.renderX-player.renderX, m.renderY-player.renderY) < 25)) triggerJumpscare();
}

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ox = canvas.width/2 - player.renderX - 20, oy = canvas.height/2 - player.renderY - 20;
    
    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) {
        if(grid[y][x]===1) { ctx.fillStyle = "#111"; ctx.fillRect(x*tileSize+ox, y*tileSize+oy, tileSize, tileSize); }
        if(x===mazeCenter.x && y===mazeCenter.y) { ctx.fillStyle = "#642"; ctx.fillRect(x*tileSize+ox+10, y*tileSize+oy+18, 20, 4); }
    }
    items.forEach(it => { 
        ctx.fillStyle = it.type === 'orange' ? "#ff8c00" : "#ffd700"; 
        ctx.beginPath(); ctx.arc(it.x*tileSize+ox+20, it.y*tileSize+oy+20, 6, 0, Math.PI*2); ctx.fill(); 
    });
    hideSpots.forEach(s => { ctx.fillStyle = "#030"; ctx.fillRect(s.x*tileSize+ox+10, s.y*tileSize+oy+10, 20, 20); });
    monsters.forEach(m => { ctx.fillStyle = "#800"; ctx.beginPath(); ctx.arc(m.renderX+ox+20, m.renderY+oy+20, 16, 0, Math.PI*2); ctx.fill(); });
    if(!player.isHiding) { ctx.fillStyle="#fff"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 11, 0, Math.PI*2); ctx.fill(); }
    
    // Lys & Mørke Logikk
    let t = document.createElement('canvas'); t.width = canvas.width; t.height = canvas.height;
    let tc = t.getContext('2d'); tc.fillStyle = "black"; tc.fillRect(0,0,t.width,t.height);
    tc.globalCompositeOperation = "destination-out";
    
    // Normal Vision + Yellow bonus
    let vRad = (player.isHiding ? 300 : 180) + (player.visionBonus * tileSize);
    let g = tc.createRadialGradient(t.width/2, t.height/2, 0, t.width/2, t.height/2, vRad);
    g.addColorStop(0, "white"); g.addColorStop(1, "transparent");
    tc.fillStyle = g; tc.beginPath(); tc.arc(t.width/2, t.height/2, vRad, 0, Math.PI*2); tc.fill();

    // Orange Lamp (4x4 felt)
    if(player.lampActive) {
        tc.fillStyle = "white";
        tc.fillRect(t.width/2 - (2*tileSize), t.height/2 - (2*tileSize), 4*tileSize, 4*tileSize);
    }
    
    ctx.drawImage(t, 0, 0);
    requestAnimationFrame(loop);
}

window.onkeydown = e => {
    let k = e.key.toLowerCase(); keys[k] = true;
    if(k === 'e' && !player.isMoving) {
        if(player.gridX === mazeCenter.x && player.gridY === mazeCenter.y) { location.reload(); return; }
        if(hideSpots.some(s => s.x===player.gridX && s.y===player.gridY) && !player.isHiding) {
            player.isHiding = true; 
            player.hideStartTime = performance.now();
            let closeM = monsters.find(m => Math.hypot(m.gridX-player.gridX, m.gridY-player.gridY) <= 5);
            if(closeM) { minigame.active = true; minigame.progress = 50; minigame.monsterRef = closeM; document.getElementById("mg-container").style.display = "block"; }
        }
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
</script>
</body>
</html>
