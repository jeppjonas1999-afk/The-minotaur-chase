<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaurens Labyrint: Sprite Edition</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        canvas { display: block; }
        #menu { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .box { border: 1px solid #333; padding: 40px; background: #111; width: 380px; text-align: center; border-radius: 4px; }
        h1 { font-weight: 200; letter-spacing: 8px; margin-bottom: 30px; }
        select, button { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 8px; cursor: pointer; }
        button { background: #fff; color: #000; font-weight: bold; margin-top: 25px; border: none; }
        #prompt { position: absolute; bottom: 20%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border: 1px solid #444; display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="menu">
        <div class="box">
            <h1>LABYRINT</h1>
            <select id="size"><option value="15">Liten</option><option value="25" selected>Stor</option></select>
            <select id="diff">
                <option value="easy">ENKEL</option>
                <option value="medium" selected>MEDIUM</option>
                <option value="hard">VANSKELIG</option>
            </select>
            <button onclick="start()">Begynn flukten</button>
        </div>
    </div>

    <div id="prompt">TRYKK [E] FOR Å BRUKE LAMPE</div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const tileSize = 40;
const moveTime = 350;

// --- SPRITE KONFIGURASJON ---
const sprites = {
    player: { up: new Image(), down: new Image(), left: new Image(), right: new Image() },
    monster: { up: new Image(), down: new Image(), left: new Image(), right: new Image() },
    wall: new Image(), exit: new Image(), yellow: new Image(), orange: new Image(), lampOn: new Image()
};
// Sett inn stier her når du har bilder, f.eks: sprites.player.up.src = "p_up.png";

let grid = [];
let isRunning = false;
let player = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, visionRadius: 180, dir: 'down' };
let monster = { gridX: 0, gridY: 0, renderX: 0, renderY: 0, targetX: 0, targetY: 0, isMoving: false, moveStart: 0, state: 'hunting', dir: 'down', waitEnd: 0, baseSpeedMult: 1, precision: 25 };
let items = [], placedLights = [], exit = {x:0, y:0};

const diffSettings = {
    easy: { mSpeed: 0.8, precision: 50 },
    medium: { mSpeed: 1.05, precision: 25 },
    hard: { mSpeed: 1.6, precision: 12 }
};

function start() {
    const s = parseInt(document.getElementById("size").value);
    const settings = diffSettings[document.getElementById("diff").value];
    generateMaze(s);
    player.gridX = 1; player.gridY = grid.length - 2;
    monster.gridX = Math.floor(grid[0].length / 2); monster.gridY = Math.floor(grid.length / 2);
    if(grid[monster.gridY][monster.gridX] === 1) monster.gridX++;
    monster.baseSpeedMult = settings.mSpeed; monster.precision = settings.precision;
    spawnItems(s);
    document.getElementById("menu").style.display = "none";
    isRunning = true;
    requestAnimationFrame(loop);
}

function generateMaze(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    function walk(x, y) {
        grid[y][x] = 0;
        let dirs = [[0,2],[0,-2],[2,0],[-2,0]].sort(() => Math.random() - 0.5);
        for(let [dx, dy] of dirs) {
            let nx = x + dx, ny = y + dy;
            if(ny > 0 && ny < dim-1 && nx > 0 && nx < dim-1 && grid[ny][nx] === 1) {
                grid[y + dy/2][x + dx/2] = 0; walk(nx, ny);
            }
        }
    }
    walk(1, 1);
    exit = { x: dim - 2, y: 1 }; grid[exit.y][exit.x] = 0;
}

function spawnItems(size) {
    items = [];
    for(let i=0; i < (size === 15 ? 8 : 15); i++) {
        let rx, ry;
        do { rx = Math.floor(Math.random()*grid[0].length); ry = Math.floor(Math.random()*grid.length); } 
        while(grid[ry][rx] === 1);
        items.push({x: rx, y: ry, type: Math.random() > 0.4 ? 'orange' : 'yellow'});
    }
}

// Funksjon for å tegne en sprite eller en farget boks hvis bildet mangler
function drawSprite(img, x, y, w, h, fallbackColor) {
    if (img.complete && img.src) {
        ctx.drawImage(img, x, y, w, h);
    } else {
        ctx.fillStyle = fallbackColor;
        ctx.fillRect(x, y, w, h);
    }
}

window.onkeydown = e => {
    keys[e.key.toLowerCase()] = true;
    if(e.key.toLowerCase() === 'e') {
        let i = items.findIndex(it => it.x === player.gridX && it.y === player.gridY);
        if(i !== -1) {
            if(items[i].type === 'orange') placedLights.push({x: player.gridX, y: player.gridY});
            else player.visionRadius += 60;
            items.splice(i, 1);
        }
    }
};
const keys = {};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;

function update(now) {
    if (!player.isMoving) {
        let dx = 0, dy = 0;
        if (keys['w'] || keys['arrowup']) { dy = -1; player.dir = 'up'; }
        else if (keys['s'] || keys['arrowdown']) { dy = 1; player.dir = 'down'; }
        else if (keys['a'] || keys['arrowleft']) { dx = -1; player.dir = 'left'; }
        else if (keys['d'] || keys['arrowright']) { dx = 1; player.dir = 'right'; }
        
        if (dx !== 0 || dy !== 0) {
            let nx = player.gridX + dx, ny = player.gridY + dy;
            if (grid[ny] && grid[ny][nx] === 0) {
                player.isMoving = true; player.moveStart = now;
                player.targetX = nx; player.targetY = ny;
            }
        }
    } else {
        let t = Math.min((now - player.moveStart) / moveTime, 1);
        player.renderX = (player.gridX + (player.targetX - player.gridX) * t) * tileSize;
        player.renderY = (player.gridY + (player.targetY - player.gridY) * t) * tileSize;
        if (t === 1) { player.isMoving = false; player.gridX = player.targetX; player.gridY = player.targetY; }
    }

    // Monster AI med pause i kryss
    if (!monster.isMoving && now > monster.waitEnd) {
        let goalX = player.gridX, goalY = player.gridY;
        let queue = [{x: monster.gridX, y: monster.gridY, path: []}];
        let visited = new Set([`${monster.gridX},${monster.gridY}`]);
        let next = null;
        
        while(queue.length > 0) {
            let curr = queue.shift();
            if(curr.x === goalX && curr.y === goalY) { next = curr.path[0]; break; }
            [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx, dy]) => {
                let nx = curr.x + dx, ny = curr.y + dy;
                if(grid[ny] && grid[ny][nx] === 0 && !visited.has(`${nx},${ny}`)) {
                    visited.add(`${nx},${ny}`);
                    queue.push({x: nx, y: ny, path: [...curr.path, {x: nx, y: ny}]});
                }
            });
        }

        if (next) {
            if (next.x > monster.gridX) monster.dir = 'right';
            else if (next.x < monster.gridX) monster.dir = 'left';
            else if (next.y > monster.gridY) monster.dir = 'down';
            else if (next.y < monster.gridY) monster.dir = 'up';

            monster.isMoving = true; monster.moveStart = now;
            monster.targetX = next.x; monster.targetY = next.y;

            let paths = 0;
            [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx, dy]) => { if(grid[monster.gridY+dy] && grid[monster.gridY+dy][monster.gridX+dx] === 0) paths++; });
            if(paths > 2) monster.waitEnd = now + 1000;
        }
    } else if (monster.isMoving) {
        let t = Math.min((now - monster.moveStart) / (moveTime / monster.baseSpeedMult), 1);
        monster.renderX = (monster.gridX + (monster.targetX - monster.gridX) * t) * tileSize;
        monster.renderY = (monster.gridY + (monster.targetY - monster.gridY) * t) * tileSize;
        if (t === 1) { monster.isMoving = false; monster.gridX = monster.targetX; monster.gridY = monster.targetY; }
    }

    document.getElementById("prompt").style.display = items.some(it => it.x === player.gridX && it.y === player.gridY) ? "block" : "none";
    if (player.gridX === exit.x && player.gridY === exit.y) { alert("FRIHET!"); location.reload(); }
    if (Math.abs(player.renderX - monster.renderX) < 20 && Math.abs(player.renderY - monster.renderY) < 20) { alert("Tatt!"); location.reload(); }
}

function loop(now) {
    if(!isRunning) return;
    update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const offX = canvas.width/2 - player.renderX - 20; const offY = canvas.height/2 - player.renderY - 20;

    // Tegn kart
    ctx.fillStyle = "#111"; ctx.fillRect(0,0, canvas.width, canvas.height);
    for(let y=0; y<grid.length; y++) {
        for(let x=0; x<grid[y].length; x++) {
            if(grid[y][x] === 1) drawSprite(sprites.wall, x*tileSize+offX, y*tileSize+offY, tileSize, tileSize, "#1a1a1a");
        }
    }
    
    items.forEach(it => drawSprite(it.type === 'orange' ? sprites.orange : sprites.yellow, it.x*tileSize+offX+10, it.y*tileSize+offY+10, 20, 20, it.type === 'orange' ? "#ffa500" : "#ff0"));
    drawSprite(sprites.exit, exit.x*tileSize+offX+5, exit.y*tileSize+offY+5, 30, 30, "#0f0");
    drawSprite(sprites.monster[monster.dir], monster.renderX+offX+5, monster.renderY+offY+5, 30, 30, "#f00");
    drawSprite(sprites.player[player.dir], canvas.width/2-15, canvas.height/2-15, 30, 30, "#fff");

    // Mørke
    let temp = document.createElement('canvas'); temp.width = canvas.width; temp.height = canvas.height;
    let tCtx = temp.getContext('2d');
    tCtx.fillStyle = "rgba(0,0,0,0.98)"; tCtx.fillRect(0,0,canvas.width,canvas.height);
    tCtx.globalCompositeOperation = "destination-out";
    
    let pG = tCtx.createRadialGradient(canvas.width/2, canvas.height/2, 20, canvas.width/2, canvas.height/2, player.visionRadius);
    pG.addColorStop(0, "white"); pG.addColorStop(1, "transparent");
    tCtx.fillStyle = pG; tCtx.beginPath(); tCtx.arc(canvas.width/2, canvas.height/2, player.visionRadius, 0, Math.PI*2); tCtx.fill();

    placedLights.forEach(l => {
        let lx = l.x*tileSize+offX+20, ly = l.y*tileSize+offY+20;
        drawSprite(sprites.lampOn, lx-20, ly-20, 40, 40, "transparent"); // Tegn selve lampen "på"
        let lG = tCtx.createRadialGradient(lx, ly, 20, lx, ly, 160);
        lG.addColorStop(0, "white"); lG.addColorStop(1, "transparent");
        tCtx.fillStyle = lG; tCtx.beginPath(); tCtx.arc(lx, ly, 160, 0, Math.PI*2); tCtx.fill();
    });

    ctx.drawImage(temp, 0, 0);
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
