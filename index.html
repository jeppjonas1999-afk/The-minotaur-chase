<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Minotaur: The Sniff & Chaos</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { display: block; }
        
        /* OVERLAY / MENY */
        .overlay { position: absolute; inset: 0; background: #0a0a0a; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #menu-wrapper { display: flex; position: relative; align-items: stretch; }
        .box { border: 2px solid #333; padding: 40px; background: #111; width: 400px; text-align: center; position: relative; z-index: 2; }
        
        /* MODIFIERS PANEL */
        #modifiers-panel { display: none; width: 420px; background: #111; border: 2px solid #333; border-left: none; padding: 20px; grid-template-columns: repeat(3, 1fr); gap: 10px; box-sizing: border-box; }
        #expand-btn { position: absolute; right: -50px; top: 50%; transform: translateY(-50%); width: 50px; height: 100px; background: #222; border: 2px solid #333; border-left: none; color: #fff; font-size: 30px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 0 10px 10px 0; }
        
        .menu-label { display: block; text-align: left; margin-top: 15px; font-size: 12px; color: #666; text-transform: uppercase; }
        select, .start-btn { width: 100%; padding: 15px; background: #1a1a1a; color: #fff; border: 1px solid #333; margin-top: 5px; cursor: pointer; font-size: 16px; font-family: inherit; }
        .start-btn { margin-top: 25px; background: #200; border-color: #500; font-weight: bold; }
        .start-btn:hover { background: #500; }

        .mod-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .mod-img { background: #fff; width: 100%; aspect-ratio: 1.8; position: relative; border: 1px solid #444; }
        .mod-title { position: absolute; bottom: 2px; width: 100%; text-align: center; color: #000; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .mod-btns { display: flex; gap: 4px; width: 100%; margin-top: 5px; }
        .mod-btns button { padding: 4px; font-size: 12px; flex: 1; background: #1a1a1a; border: 1px solid #444; color: #fff; cursor: pointer; }
        .mod-btns button.active { background: #800; border-color: #f00; font-weight: bold; }

        /* GAME UI */
        #hunt-warning { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); color: #f00; font-size: 24px; font-weight: bold; display: none; text-shadow: 0 0 15px #f00; z-index: 200; text-align: center; }
        #mg-container { position: absolute; bottom: 15%; left: 50%; transform: translateX(-50%); width: 300px; display: none; z-index: 1001; text-align: center; }
        #mg-bar-bg { width: 100%; height: 20px; background: #111; border: 2px solid #fff; overflow: hidden; }
        #mg-bar-fill { height: 100%; width: 50%; background: #0f0; }
    </style>
</head>
<body onload="initMenu()">

    <div id="hunt-warning">THE MINOTAUR IS SNIFFING AROUND... HIDE!</div>
    
    <div id="mg-container">
        <div id="mg-bar-bg"><div id="mg-bar-fill"></div></div>
        <div id="mg-text" style="margin-top:10px; font-weight:bold;">TRYKK [W]!</div>
    </div>

    <div id="menu" class="overlay">
        <div id="menu-wrapper">
            <div class="box">
                <h1 style="color:#800; letter-spacing:10px;">MINOTAUR</h1>
                <span class="menu-label">Kartstørrelse</span>
                <select id="size"><option value="15">LITEN</option><option value="25" selected>STOR</option></select>
                <span class="menu-label">Vanskelighetsgrad</span>
                <select id="diff"><option value="easy">ENKEL</option><option value="medium" selected>MEDIUM</option></select>
                <button class="start-btn" onclick="start()">START FLUKTEN</button>
            </div>
            <div id="modifiers-panel">
                <div class="mod-card">
                    <div class="mod-img"><div class="mod-title">Chaos Level</div></div>
                    <div class="mod-btns">
                        <button id="c1" onclick="setChaos(1)">1</button>
                        <button id="c2" onclick="setChaos(2)">2</button>
                        <button id="c3" onclick="setChaos(3)">3</button>
                    </div>
                </div>
            </div>
            <div id="expand-btn" onclick="togglePanel()">+</div>
        </div>
    </div>

    <canvas id="game"></canvas>

<script>
let chaos = 0, isRunning = false, lastTime = 0, grid = [], hideSpots = [], monsters = [], keys = {};
const canvas = document.getElementById("game"), ctx = canvas.getContext("2d");
const tileSize = 40, baseMoveTime = 320;

let player = { gridX: 1, gridY: 1, renderX: 0, renderY: 0, targetX:1, targetY:1, isMoving: false, isHiding: false, moveStart: 0 };
let minigame = { active: false, progress: 50, targetKey: 'w' };
let arrowRot = 0;

function initMenu() {}
function togglePanel() { 
    const p = document.getElementById('modifiers-panel'); 
    p.style.display = p.style.display === 'grid' ? 'none' : 'grid'; 
}
function setChaos(n) { 
    chaos = (chaos === n) ? 0 : n; 
    [1,2,3].forEach(i => document.getElementById('c'+i).className = (i===chaos?'active':'')); 
}

function generate(size) {
    let dim = size * 2 + 1;
    grid = Array.from({length: dim}, () => Array(dim).fill(1));
    const walk = (x, y) => {
        grid[y][x] = 0;
        [[0,2],[0,-2],[2,0],[-2,0]].sort(()=>Math.random()-0.5).forEach(([dx, dy]) => {
            let nx = x+dx, ny = y+dy;
            if(ny>0 && ny<dim-1 && nx>0 && nx<dim-1 && grid[ny][nx]===1) { grid[y+dy/2][x+dx/2]=0; walk(nx, ny); }
        });
    };
    walk(1, 1);
}

function start() {
    let s = parseInt(document.getElementById("size").value);
    generate(s);
    player.gridX = 1; player.gridY = grid.length-2;
    player.renderX = player.gridX*tileSize; player.renderY = player.gridY*tileSize;
    
    hideSpots = [];
    for(let i=0; i<s*2; i++) {
        let x, y;
        do { x = Math.floor(Math.random()*grid.length); y = Math.floor(Math.random()*grid.length); } 
        while(grid[y][x]===1);
        hideSpots.push({x, y});
    }

    monsters = [];
    for(let i=0; i<(1+chaos); i++) {
        monsters.push({
            gridX: Math.floor(grid.length/2), gridY: Math.floor(grid.length/2),
            renderX: 0, renderY: 0, isMoving: false, 
            isSniffing: false, showArrows: false, isHunting: false,
            moveStart: 0, targetX: 0, targetY: 0
        });
    }

    document.getElementById("menu").style.display = "none";
    isRunning = true; lastTime = performance.now();
    requestAnimationFrame(loop);
}

function update(now) {
    if(!isRunning) return;
    let dt = (now - lastTime)/1000; lastTime = now;
    arrowRot += dt * 5;

    monsters.forEach(m => {
        // SNIFF LOGIKK (Vinduet)
        if(!m.isSniffing && !m.isHunting && Math.random() < 0.001) {
            m.isSniffing = true;
            document.getElementById("hunt-warning").style.display = "block";
            
            setTimeout(() => {
                document.getElementById("hunt-warning").style.display = "none";
                m.showArrows = true; // Pilene kommer ETTER 2.5 sek
                
                if (!player.isHiding) {
                    m.isHunting = true; // Han fant deg!
                }

                setTimeout(() => {
                    m.isSniffing = false; m.isHunting = false; m.showArrows = false;
                }, 5000);
            }, 2500);
        }

        if(!m.isMoving) {
            let tx = m.isHunting ? player.gridX : Math.floor(Math.random()*grid.length);
            let ty = m.isHunting ? player.gridY : Math.floor(Math.random()*grid.length);
            let dx = Math.sign(tx - m.gridX), dy = Math.sign(ty - m.gridY);
            let nx = m.gridX, ny = m.gridY;
            if(dx !== 0 && grid[m.gridY][m.gridX+dx] === 0) nx += dx;
            else if(dy !== 0 && grid[m.gridY+dy][m.gridX] === 0) ny += dy;
            if(nx !== m.gridX || ny !== m.gridY) { m.isMoving = true; m.moveStart = now; m.targetX = nx; m.targetY = ny; }
        } else {
            let speed = m.isHunting ? baseMoveTime/2 : baseMoveTime;
            let t = Math.min((now - m.moveStart)/speed, 1);
            m.renderX = (m.gridX + (m.targetX - m.gridX)*t)*tileSize;
            m.renderY = (m.gridY + (m.targetY - m.gridY)*t)*tileSize;
            if(t===1) { m.gridX = m.targetX; m.gridY = m.targetY; m.isMoving = false; }
        }
    });

    // Spiller
    if(!player.isHiding && !player.isMoving) {
        let dx=0, dy=0; if(keys['w']) dy=-1; else if(keys['s']) dy=1; else if(keys['a']) dx=-1; else if(keys['d']) dx=1;
        if(dx!==0 || dy!==0) {
            let nx = player.gridX+dx, ny = player.gridY+dy;
            if(grid[ny] && grid[ny][nx]===0) { player.isMoving = true; player.moveStart = now; player.targetX = nx; player.targetY = ny; }
        }
    } else if(player.isMoving) {
        let t = Math.min((now - player.moveStart)/baseMoveTime, 1);
        player.renderX = (player.gridX + (player.targetX - player.gridX)*t)*tileSize;
        player.renderY = (player.gridY + (player.targetY - player.gridY)*t)*tileSize;
        if(t===1) { player.gridX = player.targetX; player.gridY = player.targetY; player.isMoving = false; }
    }

    // Minigame
    if(minigame.active) {
        minigame.progress -= (20 + chaos*5) * dt;
        document.getElementById("mg-bar-fill").style.width = minigame.progress + "%";
        if(minigame.progress <= 0) location.reload();
        if(minigame.progress >= 100) { minigame.active = false; player.isHiding = false; document.getElementById("mg-container").style.display = "none"; }
    }

    if(!player.isHiding && monsters.some(m => Math.hypot(m.renderX - player.renderX, m.renderY - player.renderY) < 30)) location.reload();
}

function drawArrows(m, ox, oy) {
    if(!m.showArrows) return;
    ctx.save();
    ctx.translate(m.renderX + ox + 20, m.renderY + oy + 20);
    ctx.rotate(arrowRot);
    for(let i=0; i<4; i++) {
        ctx.rotate(Math.PI/2);
        ctx.fillStyle = m.isHunting ? "#f00" : "#ff0";
        ctx.beginPath();
        ctx.moveTo(35, 0); ctx.lineTo(20, -10); ctx.lineTo(20, 10);
        ctx.fill();
    }
    ctx.restore();
}

function loop(now) {
    if(!isRunning) return; update(now);
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const ox = canvas.width/2 - player.renderX - 20, oy = canvas.height/2 - player.renderY - 20;

    ctx.fillStyle = "#050505"; ctx.fillRect(0,0,canvas.width,canvas.height);
    for(let y=0; y<grid.length; y++) for(let x=0; x<grid[y].length; x++) {
        if(grid[y][x] === 1) { ctx.fillStyle = "#111"; ctx.fillRect(x*tileSize+ox, y*tileSize+oy, tileSize, tileSize); }
    }

    hideSpots.forEach(s => { ctx.fillStyle = "#040"; ctx.fillRect(s.x*tileSize+ox+10, s.y*tileSize+oy+10, 20, 20); });

    monsters.forEach(m => {
        ctx.fillStyle = m.isHunting ? "#f00" : (m.isSniffing ? "#a50" : "#600");
        ctx.beginPath(); ctx.arc(m.renderX+ox+20, m.renderY+oy+20, 15, 0, Math.PI*2); ctx.fill();
        drawArrows(m, ox, oy);
    });

    if(!player.isHiding) { ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 10, 0, Math.PI*2); ctx.fill(); }

    let t = document.createElement('canvas'); t.width = canvas.width; t.height = canvas.height;
    let tc = t.getContext('2d'); tc.fillStyle = "black"; tc.fillRect(0,0,t.width,t.height);
    tc.globalCompositeOperation = "destination-out";
    let vRad = player.isHiding ? 400 : 180;
    let g = tc.createRadialGradient(t.width/2, t.height/2, 0, t.width/2, t.height/2, vRad);
    g.addColorStop(0, "white"); g.addColorStop(1, "transparent");
    tc.fillStyle = g; tc.beginPath(); tc.arc(t.width/2, t.height/2, vRad, 0, Math.PI*2); tc.fill();
    ctx.drawImage(t, 0, 0);

    requestAnimationFrame(loop);
}

window.onkeydown = e => {
    let k = e.key.toLowerCase(); keys[k] = true;
    if(minigame.active && k === minigame.targetKey) {
        minigame.progress += 10;
        minigame.targetKey = ['w','a','s','d'][Math.floor(Math.random()*4)];
        document.getElementById("mg-text").innerText = `TRYKK [${minigame.targetKey.toUpperCase()}]!`;
    }
    if(k === 'e' && !player.isMoving) {
        if(hideSpots.some(s => s.x === player.gridX && s.y === player.gridY) && !player.isHiding) {
            player.isHiding = true; 
            if(monsters.some(m => m.isSniffing || m.showArrows || Math.hypot(m.gridX-player.gridX, m.gridY-player.gridY) < 6)) {
                minigame.active = true; minigame.progress = 50;
                document.getElementById("mg-container").style.display = "block";
            }
        }
    }
};
window.onkeyup = e => keys[e.key.toLowerCase()] = false;
</script>
</body>
</html>
